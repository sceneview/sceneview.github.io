<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SceneView 3D Embed</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Filament.js v1.70.1 WASM engine (required by SceneView Web) -->
  <script src="/js/filament/filament.js"></script>
  <!-- SceneView Web — our 3D library built on Filament.js -->
  <script src="/js/sceneview.js?v=1.3.3"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: var(--bg-color, #1a1a2e);
      display: flex;
      flex-direction: column;
    }

    /* Viewer fills available space */
    #viewer-container {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    #viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Loading state */
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-color, #1a1a2e);
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #5b8def;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error state */
    .error-message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #aaa;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
    }

    .error-message.visible { display: flex; }

    .error-message div { max-width: 320px; }

    .error-message code {
      display: block;
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      font-size: 12px;
      word-break: break-all;
      color: #ccc;
    }

    /* SceneView watermark — bottom-right */
    .watermark {
      position: absolute;
      bottom: 8px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      z-index: 5;
      transition: color 0.2s;
      pointer-events: auto;
    }

    .watermark:hover { color: rgba(255, 255, 255, 0.7); }

    .watermark svg {
      width: 12px;
      height: 12px;
      opacity: 0.5;
    }

    /* Powered-by footer */
    .footer {
      flex-shrink: 0;
      text-align: center;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .footer a {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    .footer a:hover { color: rgba(255, 255, 255, 0.7); }

    /* Hide footer when nofooter param is set */
    .footer.hidden { display: none; }
  </style>
</head>
<body>
  <div id="viewer-container">
    <!-- Loading spinner -->
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
    </div>

    <!-- Error state -->
    <div class="error-message" id="error">
      <div>
        <strong>No model specified</strong><br>
        Add a <code>?model=URL_TO_GLB</code> parameter to the embed URL.
      </div>
    </div>

    <!-- 3D viewer canvas -->
    <canvas id="viewer" style="display:none;"></canvas>

    <!-- Watermark -->
    <a class="watermark" href="https://sceneview.github.io" target="_blank" rel="noopener" title="SceneView — 3D & AR SDK">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      SceneView
    </a>
  </div>

  <!-- Footer -->
  <div class="footer" id="footer">
    <a href="https://sceneview.github.io" target="_blank" rel="noopener">Powered by SceneView</a>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var modelUrl = params.get('model');
      var bg = params.get('bg');
      var nofooter = params.has('nofooter');

      var canvas = document.getElementById('viewer');
      var loading = document.getElementById('loading');
      var error = document.getElementById('error');
      var footer = document.getElementById('footer');

      // Background color
      if (bg) {
        var color = bg.startsWith('#') ? bg : '#' + bg;
        document.body.style.setProperty('--bg-color', color);
        document.body.style.background = color;
      }

      // Footer visibility
      if (nofooter) footer.classList.add('hidden');

      // No model URL — show error
      if (!modelUrl) {
        loading.classList.add('hidden');
        error.classList.add('visible');
        return;
      }

      // Show canvas and init SceneView
      canvas.style.display = 'block';

      // Parse bg color to RGBA array for SceneView
      var bgColor = [0.1, 0.1, 0.18, 1.0]; // default dark
      if (bg) {
        var hex = bg.replace('#', '');
        if (hex.length === 6) {
          bgColor = [
            parseInt(hex.substring(0, 2), 16) / 255,
            parseInt(hex.substring(2, 4), 16) / 255,
            parseInt(hex.substring(4, 6), 16) / 255,
            1.0
          ];
        }
      }

      SceneView.modelViewer('viewer', modelUrl, {
        backgroundColor: bgColor,
        lightIntensity: 150000,
        fov: 35
      }).then(function () {
        loading.classList.add('hidden');
      }).catch(function (e) {
        console.error('SceneView embed error:', e);
        loading.classList.add('hidden');
      });

      // Safety timeout — hide loader after 15s regardless
      setTimeout(function () {
        loading.classList.add('hidden');
      }, 15000);
    })();
  </script>
</body>
</html>
