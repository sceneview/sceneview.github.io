<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SceneView 3D</title>
  <!-- Filament.js v1.70.1 WASM engine (required by SceneView Web) -->
  <script src="/js/filament/filament.js"></script>
  <!-- SceneView Web — our 3D library built on Filament.js -->
  <script src="/js/sceneview.js?v=1.3.3"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <script>
    var params = new URLSearchParams(window.location.search);
    var model = params.get('model');
    if (model && /^https?:\/\/.+\.(glb|gltf|usdz)(\?.*)?$/i.test(model)) {
      var canvas = document.createElement('canvas');
      canvas.id = 'embed-canvas';
      canvas.style.cssText = 'width:100%;height:100%';
      document.body.appendChild(canvas);

      SceneView.modelViewer('embed-canvas', model, {
        backgroundColor: [0.0, 0.0, 0.0, 0.0],
        lightIntensity: 150000,
        fov: 35
      }).catch(function(e) {
        console.error('SceneView embed error:', e);
      });
    }
  </script>
</body>
</html>
