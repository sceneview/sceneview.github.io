<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <linearGradient id="ap-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="ap-road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="ap-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/><stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="ap-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Phone frame -->
  <rect x="10" y="10" width="260" height="460" rx="36" fill="#1A1A1A"/>
  <rect x="12" y="12" width="256" height="456" rx="34" fill="#2A2A2A"/>
  <rect x="24" y="32" width="232" height="416" rx="6" fill="url(#ap-bg)"/>
  <rect x="90" y="14" width="100" height="22" rx="11" fill="#1A1A1A"/>
  <text x="40" y="50" font-family="system-ui" font-size="10" fill="white" font-weight="600" opacity="0.6">9:41</text>
  <rect x="34" y="56" width="212" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="140" y="75" font-family="system-ui" font-size="10" fill="white" text-anchor="middle" font-weight="700">Autopilot HUD</text>
  <!-- Scene -->
  <rect x="24" y="90" width="232" height="250" rx="0" fill="url(#ap-sky)"/>
  <path d="M24,340 L24,260 L80,180 Q140,140 200,180 L256,260 L256,340 Z" fill="url(#ap-road)"/>
  <line x1="110" y1="340" x2="120" y2="190" stroke="white" stroke-width="2" stroke-dasharray="10,8" opacity="0.5"/>
  <line x1="170" y1="340" x2="160" y2="190" stroke="white" stroke-width="2" stroke-dasharray="10,8" opacity="0.5"/>
  <line x1="50" y1="340" x2="85" y2="195" stroke="#FDE68A" stroke-width="2" opacity="0.4"/>
  <line x1="230" y1="340" x2="195" y2="195" stroke="#FDE68A" stroke-width="2" opacity="0.4"/>
  <g filter="url(#ap-glow)">
    <path d="M125,260 L140,220 L155,260 Z" fill="#06B6D4" opacity="0.7"/>
    <path d="M130,255 L140,225 L150,255 Z" fill="#22D3EE" opacity="0.5"/>
  </g>
  <g opacity="0.3">
    <rect x="24" y="140" width="30" height="60" fill="#1E293B"/>
    <rect x="60" y="155" width="20" height="40" fill="#1E293B"/>
    <rect x="200" y="150" width="25" height="50" fill="#1E293B"/>
    <rect x="230" y="135" width="26" height="65" fill="#1E293B"/>
    <rect x="28" y="148" width="4" height="4" fill="#FDE68A" opacity="0.6"/>
    <rect x="36" y="148" width="4" height="4" fill="#FDE68A" opacity="0.4"/>
    <rect x="234" y="142" width="4" height="4" fill="#FDE68A" opacity="0.5"/>
  </g>
  <g transform="translate(200, 160)" filter="url(#ap-glow)">
    <rect x="0" y="0" width="14" height="32" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
    <circle cx="7" cy="8" r="4" fill="#334155"/><circle cx="7" cy="16" r="4" fill="#334155"/>
    <circle cx="7" cy="24" r="4" fill="#22C55E"/>
  </g>
  <g transform="translate(34, 100)">
    <text x="0" y="15" font-family="system-ui" font-size="28" fill="white" font-weight="800" opacity="0.9">67</text>
    <text x="52" y="15" font-family="system-ui" font-size="10" fill="#94A3B8" font-weight="500">km/h</text>
  </g>
  <g transform="translate(180, 100)">
    <rect x="0" y="0" width="66" height="20" rx="10" fill="rgba(34,197,94,0.15)"/>
    <circle cx="12" cy="10" r="4" fill="#22C55E" filter="url(#ap-glow)"/>
    <text x="22" y="14" font-family="system-ui" font-size="7" fill="#22C55E" font-weight="600">AUTO ON</text>
  </g>
  <text x="34" y="136" font-family="system-ui" font-size="9" fill="#67E8F9" font-weight="600">&#x2197; Right on Main St — 200m</text>
  <g transform="translate(34, 355)">
    <text x="0" y="0" font-family="system-ui" font-size="9" fill="#94A3B8" font-weight="700">AUTOPILOT MODE</text>
    <g transform="translate(0, 10)">
      <rect x="0" y="0" width="68" height="26" rx="13" fill="rgba(34,197,94,0.15)" stroke="#22C55E" stroke-width="1"/>
      <text x="34" y="17" font-family="system-ui" font-size="8" fill="#22C55E" text-anchor="middle" font-weight="600">Full Auto</text>
      <rect x="74" y="0" width="68" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="#64748B"/>
      <text x="108" y="17" font-family="system-ui" font-size="8" fill="#94A3B8" text-anchor="middle">Cruise</text>
      <rect x="148" y="0" width="68" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="#64748B"/>
      <text x="182" y="17" font-family="system-ui" font-size="8" fill="#94A3B8" text-anchor="middle">Manual</text>
    </g>
  </g>
  <g transform="translate(34, 400)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="rgba(255,255,255,0.06)"/>
    <text x="15" y="20" font-family="system-ui" font-size="9" fill="white" font-weight="600">ETA</text>
    <text x="46" y="20" font-family="system-ui" font-size="10" fill="#67E8F9" font-weight="700">8 min</text>
    <rect x="112" y="0" width="100" height="32" rx="16" fill="rgba(255,255,255,0.06)"/>
    <text x="127" y="20" font-family="system-ui" font-size="9" fill="white" font-weight="600">Dist</text>
    <text x="162" y="20" font-family="system-ui" font-size="10" fill="#67E8F9" font-weight="700">3.2 km</text>
  </g>
  <rect x="100" y="454" width="80" height="4" rx="2" fill="#666"/>
</svg>
