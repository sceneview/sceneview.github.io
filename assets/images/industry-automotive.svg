<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-auto" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <linearGradient id="hud-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="shadow-auto">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#06B6D4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="24" fill="url(#bg-auto)"/>

  <!-- Car dashboard screen -->
  <g filter="url(#shadow-auto)" transform="translate(30, 40)">
    <rect width="340" height="190" rx="20" fill="#111118"/>
    <rect x="10" y="8" width="320" height="174" rx="12" fill="#0D0D15"/>

    <!-- Speed cluster -->
    <circle cx="90" cy="95" r="55" fill="none" stroke="#7B61FF" stroke-width="2" opacity="0.3"/>
    <circle cx="90" cy="95" r="55" fill="none" stroke="#7B61FF" stroke-width="3" stroke-dasharray="190 160" stroke-dashoffset="-80" opacity="0.6"/>
    <text x="90" y="105" font-family="monospace" font-size="32" fill="#7B61FF" text-anchor="middle" font-weight="700">72</text>
    <text x="90" y="122" font-family="sans-serif" font-size="10" fill="#A78BFA" text-anchor="middle">km/h</text>

    <!-- Navigation -->
    <polygon points="200,60 220,45 220,55 260,55 260,65 220,65 220,75" fill="#06B6D4" opacity="0.7"/>
    <text x="200" y="95" font-family="sans-serif" font-size="12" fill="#67E8F9" font-weight="500">Oak Street</text>
    <text x="200" y="112" font-family="sans-serif" font-size="10" fill="#67E8F9" opacity="0.6">Turn right in 200m</text>

    <!-- 3D map preview -->
    <path d="M180 130 L240 118 L300 130 L240 142Z" fill="#7B61FF" opacity="0.15" stroke="#7B61FF" stroke-width="0.5"/>
    <path d="M200 138 L260 126 L320 138 L260 150Z" fill="#A78BFA" opacity="0.1" stroke="#A78BFA" stroke-width="0.5"/>
    <circle cx="240" cy="130" r="3" fill="#06B6D4"/>

    <!-- Traffic lights -->
    <circle cx="290" cy="55" r="8" fill="#10B981" opacity="0.8"/>
    <circle cx="310" cy="55" r="8" fill="#10B981" opacity="0.2"/>
    <circle cx="290" cy="75" r="4" fill="#FCD34D" opacity="0.2"/>

    <!-- Battery -->
    <rect x="270" y="100" width="50" height="8" rx="4" fill="#1C1B2E"/>
    <rect x="270" y="100" width="35" height="8" rx="4" fill="#10B981" opacity="0.6"/>
    <text x="295" y="120" font-family="sans-serif" font-size="8" fill="#6C7086" text-anchor="middle">70%</text>

    <!-- "Powered by SceneView" -->
    <rect x="105" y="164" width="130" height="14" rx="7" fill="#7B61FF" opacity="0.12"/>
    <text x="170" y="174" font-family="sans-serif" font-size="8" fill="#A78BFA" text-anchor="middle" font-weight="600">Rendered with SceneView</text>
  </g>

  <!-- Steering wheel hint -->
  <path d="M160 260 Q200 275 240 260" fill="none" stroke="#CAC4D0" stroke-width="2" stroke-linecap="round"/>

  <text x="200" y="295" font-family="sans-serif" font-size="11" fill="#49454F" text-anchor="middle" font-weight="600" opacity="0.7">AUTOMOTIVE HUD</text>
</svg>
