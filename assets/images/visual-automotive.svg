<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <!-- M3 tonal background -->
  <rect width="600" height="340" rx="24" fill="#F4EFF4"/>

  <!-- Widescreen HUD display -->
  <rect x="80" y="50" width="440" height="190" rx="28" fill="white" stroke="#CAC4D0" stroke-width="1.5"/>

  <!-- Subtle dark interior -->
  <rect x="80" y="50" width="440" height="190" rx="28" fill="#1C1B1F" opacity="0.04"/>

  <!-- Speed: 87 -->
  <text x="200" y="160" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="42" font-weight="700" fill="#6750A4" text-anchor="middle" letter-spacing="-1">87</text>

  <!-- km/h label -->
  <text x="200" y="178" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="11" fill="#625B71" text-anchor="middle" font-weight="400">km/h</text>

  <!-- Navigation chevron (abstract arrow) -->
  <path d="M 350,100 L 380,135 L 350,125 L 320,135 Z" fill="#C8E6C9"/>

  <!-- Dotted route line -->
  <line x1="380" y1="135" x2="470" y2="165" stroke="#B4C5E4" stroke-width="1.5" stroke-dasharray="4 6" stroke-linecap="round"/>

  <!-- Small decorative dot at route end -->
  <circle cx="470" cy="165" r="3" fill="#B4C5E4" opacity="0.5"/>

  <!-- Bottom-left gauge arc -->
  <path d="M 110,215 A 24 24 0 0 1 148,205" fill="none" stroke="#C8E6C9" stroke-width="3" stroke-linecap="round"/>

  <!-- Small accent circle near gauge -->
  <circle cx="110" cy="215" r="2.5" fill="#C8E6C9" opacity="0.6"/>

  <!-- Floating soft purple circle (decorative, top-right area) -->
  <circle cx="480" cy="85" r="8" fill="#D0BCFF" opacity="0.35"/>

  <!-- Small accent rectangle (decorative, abstract) -->
  <rect x="440" y="195" width="30" height="4" rx="2" fill="#D0BCFF" opacity="0.3"/>

  <!-- Bottom text -->
  <text x="300" y="280" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="13" fill="#6750A4" text-anchor="middle" font-weight="500">Automotive</text>
  <text x="300" y="296" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#625B71" text-anchor="middle" font-weight="400">HUD &amp; dashboard</text>
</svg>