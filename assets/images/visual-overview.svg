<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <linearGradient id="envGrad" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#D0BCFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EFB8C8" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="envRadial" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#D0BCFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#EFB8C8" stop-opacity="0.1"/>
    </radialGradient>
    <linearGradient id="nodeGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D0BCFF"/>
      <stop offset="100%" stop-color="#CCC2DC"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFB8C8"/>
      <stop offset="100%" stop-color="#E8C5D0"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B4C5E4"/>
      <stop offset="100%" stop-color="#C8D5EA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" fill="#FFFBFE"/>

  <!-- Subtle background shape -->
  <circle cx="400" cy="160" r="180" fill="#F4EFF4" opacity="0.3"/>

  <!-- ==================== LEFT ZONE: Assets ==================== -->

  <!-- Model file — rounded square -->
  <rect x="68" y="88" width="40" height="40" rx="10" fill="#D0BCFF" opacity="0.55"/>
  <text x="88" y="146" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="10" fill="#625B71" text-anchor="middle">Model</text>

  <!-- Environment — circle with gradient -->
  <circle cx="88" cy="180" r="20" fill="url(#envRadial)"/>
  <text x="88" y="218" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="10" fill="#625B71" text-anchor="middle">Environment</text>

  <!-- Compose — diamond -->
  <rect x="76" y="246" width="24" height="24" rx="4" fill="#EFB8C8" opacity="0.5" transform="rotate(45 88 258)"/>
  <text x="88" y="290" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="10" fill="#625B71" text-anchor="middle">Compose</text>

  <!-- Bottom label: left -->
  <text x="88" y="322" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="11" fill="#625B71" text-anchor="middle" letter-spacing="0.05em">Standard assets</text>

  <!-- ==================== CONNECTING CURVES LEFT ==================== -->
  <path d="M 118 108 C 175 108, 220 135, 280 140" fill="none" stroke="#D0BCFF" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>
  <path d="M 118 180 C 175 180, 220 172, 280 170" fill="none" stroke="#D0BCFF" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>
  <path d="M 118 258 C 175 258, 220 210, 280 200" fill="none" stroke="#D0BCFF" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>

  <!-- ==================== CENTER ZONE: Declarative API ==================== -->

  <!-- Large container -->
  <rect x="280" y="68" width="240" height="200" rx="28" fill="#F4EFF4"/>

  <!-- Scene { } label -->
  <text x="400" y="110" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="18" font-weight="500" fill="#6750A4" text-anchor="middle">Scene { }</text>

  <!-- Abstract node graph inside -->
  <!-- Node 1 — purple circle -->
  <circle cx="350" cy="155" r="14" fill="url(#nodeGrad1)" opacity="0.7"/>

  <!-- Node 2 — pink circle -->
  <circle cx="420" cy="175" r="11" fill="url(#nodeGrad2)" opacity="0.65"/>

  <!-- Node 3 — blue rounded square -->
  <rect x="370" y="210" width="22" height="22" rx="6" fill="url(#nodeGrad3)" opacity="0.6"/>

  <!-- Connections between nodes — thin lines -->
  <line x1="362" y1="161" x2="411" y2="170" stroke="#CCC2DC" stroke-width="1" opacity="0.5"/>
  <line x1="418" y1="185" x2="388" y2="210" stroke="#CCC2DC" stroke-width="1" opacity="0.5"/>
  <line x1="355" y1="168" x2="375" y2="215" stroke="#CCC2DC" stroke-width="1" opacity="0.5"/>

  <!-- Bottom label: center -->
  <text x="400" y="322" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="11" fill="#625B71" text-anchor="middle" letter-spacing="0.05em">Declarative API</text>

  <!-- ==================== CONNECTING CURVES RIGHT ==================== -->
  <path d="M 520 140 C 570 135, 600 108, 640 108" fill="none" stroke="#D0BCFF" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>
  <path d="M 520 170 C 570 170, 600 175, 640 175" fill="none" stroke="#D0BCFF" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>
  <path d="M 520 200 C 570 210, 600 240, 640 245" fill="none" stroke="#D0BCFF" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>

  <!-- ==================== RIGHT ZONE: Every screen ==================== -->

  <!-- Phone — tall rect outline -->
  <rect x="650" y="84" width="28" height="48" rx="6" fill="none" stroke="#CAC4D0" stroke-width="1.5"/>
  <!-- Checkmark dot -->
  <circle cx="690" cy="100" r="4" fill="#C8E6C9"/>
  <text x="664" y="150" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="10" fill="#625B71" text-anchor="middle">Phone</text>

  <!-- Tablet — wide rect outline -->
  <rect x="640" y="162" width="48" height="30" rx="6" fill="none" stroke="#CAC4D0" stroke-width="1.5"/>
  <!-- Checkmark dot -->
  <circle cx="700" cy="172" r="4" fill="#C8E6C9"/>
  <text x="664" y="210" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="10" fill="#625B71" text-anchor="middle">Tablet</text>

  <!-- XR — circle outline -->
  <circle cx="664" cy="245" r="18" fill="none" stroke="#CAC4D0" stroke-width="1.5"/>
  <!-- Checkmark dot -->
  <circle cx="690" cy="235" r="4" fill="#C8E6C9"/>
  <text x="664" y="280" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="10" fill="#625B71" text-anchor="middle">XR</text>

  <!-- Bottom label: right -->
  <text x="664" y="322" font-family="'Google Sans', 'Product Sans', system-ui, sans-serif" font-size="11" fill="#625B71" text-anchor="middle" letter-spacing="0.05em">Every screen</text>

</svg>