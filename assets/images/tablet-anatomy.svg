<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="tabletBezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>
    <linearGradient id="heartHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aortaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="veinGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <filter id="shadowA" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#0D9488" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDFA"/>
      <stop offset="100%" stop-color="#E0F2F1"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Tablet frame -->
  <rect x="5" y="10" width="410" height="300" rx="20" ry="20" fill="url(#tabletBezel)" stroke="#6B7280" stroke-width="1"/>
  <rect x="7" y="12" width="406" height="296" rx="18" ry="18" fill="none" stroke="#D1D5DB" stroke-width="0.5"/>
  <!-- Front camera -->
  <circle cx="210" cy="18" r="2.5" fill="#4B5563"/>
  <circle cx="210" cy="18" r="1.2" fill="#1F2937"/>

  <!-- Screen area -->
  <rect x="18" y="26" width="384" height="268" rx="4" fill="url(#screenBg)"/>

  <!-- Left sidebar -->
  <rect x="18" y="26" width="80" height="268" fill="#F8FAFC" rx="4"/>
  <rect x="18" y="26" width="80" height="268" fill="none" stroke="#E2E8F0" stroke-width="0.5" rx="4"/>

  <!-- Sidebar title -->
  <text x="58" y="44" text-anchor="middle" font-size="7" font-weight="700" fill="#0F172A">Organs</text>
  <line x1="26" y1="50" x2="90" y2="50" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- Organ list items -->
  <!-- Heart - selected -->
  <rect x="24" y="56" width="68" height="22" rx="6" fill="#0D9488" fill-opacity="0.12"/>
  <rect x="24" y="56" width="68" height="22" rx="6" fill="none" stroke="#0D9488" stroke-width="1"/>
  <circle cx="35" cy="67" r="5" fill="#EF4444" fill-opacity="0.2"/>
  <path d="M32.5 65.5 C32.5 64, 34 63, 35 64.5 C36 63, 37.5 64, 37.5 65.5 C37.5 67.5, 35 69, 35 69 C35 69, 32.5 67.5, 32.5 65.5Z" fill="#EF4444"/>
  <text x="44" y="69.5" font-size="6.5" font-weight="600" fill="#0D9488">Heart</text>

  <!-- Lungs -->
  <rect x="24" y="83" width="68" height="22" rx="6" fill="transparent"/>
  <circle cx="35" cy="94" r="5" fill="#F0ABFC" fill-opacity="0.2"/>
  <ellipse cx="33" cy="94" rx="3" ry="4" fill="none" stroke="#C084FC" stroke-width="0.8"/>
  <ellipse cx="37" cy="94" rx="3" ry="4" fill="none" stroke="#C084FC" stroke-width="0.8"/>
  <text x="44" y="96.5" font-size="6.5" fill="#64748B">Lungs</text>

  <!-- Brain -->
  <rect x="24" y="110" width="68" height="22" rx="6" fill="transparent"/>
  <circle cx="35" cy="121" r="5" fill="#FDE68A" fill-opacity="0.2"/>
  <path d="M32 121 C32 118, 35 117, 35 119 C35 117, 38 118, 38 121 C38 123, 35 124, 35 124 C35 124, 32 123, 32 121Z" fill="#FBBF24" fill-opacity="0.6" stroke="#F59E0B" stroke-width="0.5"/>
  <text x="44" y="123.5" font-size="6.5" fill="#64748B">Brain</text>

  <!-- Skeleton -->
  <rect x="24" y="137" width="68" height="22" rx="6" fill="transparent"/>
  <circle cx="35" cy="148" r="5" fill="#E2E8F0"/>
  <line x1="35" y1="144" x2="35" y2="152" stroke="#94A3B8" stroke-width="1"/>
  <line x1="33" y1="146" x2="37" y2="146" stroke="#94A3B8" stroke-width="1"/>
  <circle cx="35" cy="143.5" r="1.5" fill="none" stroke="#94A3B8" stroke-width="0.8"/>
  <text x="44" y="150.5" font-size="6.5" fill="#64748B">Skeleton</text>

  <!-- Sidebar bottom icons -->
  <line x1="26" y1="260" x2="90" y2="260" stroke="#E2E8F0" stroke-width="0.5"/>
  <circle cx="42" cy="275" r="7" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.5"/>
  <text x="42" y="277.5" text-anchor="middle" font-size="7" fill="#64748B">Set</text>
  <circle cx="66" cy="275" r="7" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.5"/>
  <text x="66" y="277.5" text-anchor="middle" font-size="7" fill="#64748B">?</text>

  <!-- Main content area - center heart -->
  <rect x="100" y="26" width="218" height="268" fill="#0F172A" fill-opacity="0.03"/>

  <!-- 3D Heart Model -->
  <g transform="translate(205, 155)">
    <!-- Heart shadow -->
    <ellipse cx="2" cy="62" rx="40" ry="8" fill="#000" fill-opacity="0.06"/>

    <!-- Main heart body -->
    <path d="M0 -10 C-8 -45, -55 -45, -55 -15 C-55 15, -30 40, 0 60 C30 40, 55 15, 55 -15 C55 -45, 8 -45, 0 -10Z" fill="url(#heartGrad)" stroke="#991B1B" stroke-width="0.5"/>

    <!-- Heart highlight/shine -->
    <path d="M0 -10 C-8 -45, -55 -45, -55 -15 C-55 15, -30 40, 0 60 C30 40, 55 15, 55 -15 C55 -45, 8 -45, 0 -10Z" fill="url(#heartShine)"/>

    <!-- Ventricle line (center divide) -->
    <path d="M0 -8 C-2 5, -3 20, 0 55" fill="none" stroke="#7F1D1D" stroke-width="1.2" stroke-opacity="0.5"/>

    <!-- Left ventricle shading -->
    <path d="M-5 10 C-15 5, -30 10, -35 0 C-30 15, -20 30, -5 40Z" fill="#991B1B" fill-opacity="0.25"/>

    <!-- Right ventricle shading -->
    <path d="M5 10 C15 5, 30 10, 35 0 C30 15, 20 30, 5 40Z" fill="#7F1D1D" fill-opacity="0.2"/>

    <!-- Aorta (main artery coming out top) -->
    <path d="M-8 -20 C-10 -35, -5 -50, 8 -55 C15 -57, 22 -50, 20 -42" fill="none" stroke="url(#aortaGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-8 -20 C-10 -35, -5 -50, 8 -55 C15 -57, 22 -50, 20 -42" fill="none" stroke="#FCA5A5" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>

    <!-- Pulmonary artery -->
    <path d="M5 -18 C8 -30, 15 -38, 28 -40 C32 -40, 35 -36, 33 -32" fill="none" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Superior vena cava -->
    <path d="M-15 -15 C-18 -28, -22 -40, -28 -48" fill="none" stroke="url(#veinGrad)" stroke-width="4" stroke-linecap="round"/>

    <!-- Small vessels -->
    <path d="M-35 -5 C-42 -8, -45 -3, -42 2" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
    <path d="M35 -5 C42 -8, 45 -3, 42 2" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>

    <!-- Surface detail lines -->
    <path d="M-20 -5 C-15 2, -8 5, -5 0" fill="none" stroke="#B91C1C" stroke-width="0.5" stroke-opacity="0.4"/>
    <path d="M15 0 C18 5, 25 8, 30 3" fill="none" stroke="#B91C1C" stroke-width="0.5" stroke-opacity="0.4"/>
  </g>

  <!-- Annotation: Left Ventricle -->
  <line x1="185" y1="170" x2="142" y2="195" stroke="#0D9488" stroke-width="0.8" stroke-dasharray="2,1"/>
  <circle cx="185" cy="170" r="2" fill="#0D9488"/>
  <rect x="102" y="188" width="52" height="16" rx="3" fill="white" stroke="#0D9488" stroke-width="0.8"/>
  <text x="128" y="199" text-anchor="middle" font-size="5.5" font-weight="600" fill="#0D9488">Left Ventricle</text>

  <!-- Annotation: Aorta -->
  <line x1="213" y1="105" x2="260" y2="85" stroke="#0D9488" stroke-width="0.8" stroke-dasharray="2,1"/>
  <circle cx="213" cy="105" r="2" fill="#0D9488"/>
  <rect x="250" y="77" width="32" height="16" rx="3" fill="white" stroke="#0D9488" stroke-width="0.8"/>
  <text x="266" y="88" text-anchor="middle" font-size="5.5" font-weight="600" fill="#0D9488">Aorta</text>

  <!-- Annotation: Pulmonary Artery -->
  <line x1="230" y1="118" x2="270" y2="110" stroke="#0D9488" stroke-width="0.8" stroke-dasharray="2,1"/>
  <circle cx="230" cy="118" r="2" fill="#0D9488"/>
  <rect x="258" y="102" width="58" height="16" rx="3" fill="white" stroke="#0D9488" stroke-width="0.8"/>
  <text x="287" y="113" text-anchor="middle" font-size="5.5" font-weight="600" fill="#0D9488">Pulmonary A.</text>

  <!-- Right panel - Properties -->
  <rect x="320" y="26" width="82" height="268" fill="white" rx="4"/>
  <rect x="320" y="26" width="82" height="268" fill="none" stroke="#E2E8F0" stroke-width="0.5" rx="4"/>

  <!-- Panel title -->
  <text x="361" y="44" text-anchor="middle" font-size="7" font-weight="700" fill="#0F172A">Properties</text>
  <line x1="328" y1="50" x2="394" y2="50" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- Opacity control -->
  <text x="328" y="65" font-size="5.5" fill="#64748B">Opacity</text>
  <text x="392" y="65" text-anchor="end" font-size="5.5" font-weight="600" fill="#0D9488">85%</text>
  <rect x="328" y="70" width="64" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="328" y="70" width="54" height="4" rx="2" fill="#0D9488"/>
  <circle cx="382" cy="72" r="4" fill="white" stroke="#0D9488" stroke-width="1.5"/>

  <!-- Cross Section control -->
  <text x="328" y="92" font-size="5.5" fill="#64748B">Cross Section</text>
  <text x="392" y="92" text-anchor="end" font-size="5.5" font-weight="600" fill="#0D9488">40%</text>
  <rect x="328" y="97" width="64" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="328" y="97" width="26" height="4" rx="2" fill="#0D9488"/>
  <circle cx="354" cy="99" r="4" fill="white" stroke="#0D9488" stroke-width="1.5"/>

  <!-- Rotation toggle -->
  <text x="328" y="120" font-size="5.5" fill="#64748B">Auto Rotate</text>
  <!-- Toggle switch ON -->
  <rect x="370" y="114" width="22" height="12" rx="6" fill="#0D9488"/>
  <circle cx="386" cy="120" r="4.5" fill="white"/>

  <!-- Show Vessels toggle -->
  <text x="328" y="145" font-size="5.5" fill="#64748B">Show Vessels</text>
  <rect x="370" y="139" width="22" height="12" rx="6" fill="#0D9488"/>
  <circle cx="386" cy="145" r="4.5" fill="white"/>

  <!-- Labels toggle -->
  <text x="328" y="170" font-size="5.5" fill="#64748B">Labels</text>
  <rect x="370" y="164" width="22" height="12" rx="6" fill="#0D9488"/>
  <circle cx="386" cy="170" r="4.5" fill="white"/>

  <!-- Divider -->
  <line x1="328" y1="182" x2="394" y2="182" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- View mode section -->
  <text x="328" y="196" font-size="5.5" font-weight="600" fill="#0F172A">View Mode</text>

  <!-- Radio buttons -->
  <circle cx="334" cy="210" r="4" fill="none" stroke="#0D9488" stroke-width="1"/>
  <circle cx="334" cy="210" r="2" fill="#0D9488"/>
  <text x="342" y="212.5" font-size="5.5" fill="#334155">Exterior</text>

  <circle cx="334" cy="226" r="4" fill="none" stroke="#CBD5E1" stroke-width="1"/>
  <text x="342" y="228.5" font-size="5.5" fill="#64748B">Interior</text>

  <circle cx="334" cy="242" r="4" fill="none" stroke="#CBD5E1" stroke-width="1"/>
  <text x="342" y="244.5" font-size="5.5" fill="#64748B">X-Ray</text>

  <!-- Divider -->
  <line x1="328" y1="254" x2="394" y2="254" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- Reset button -->
  <rect x="330" y="262" width="60" height="20" rx="6" fill="#F0FDFA" stroke="#0D9488" stroke-width="0.8"/>
  <text x="360" y="275" text-anchor="middle" font-size="6" font-weight="600" fill="#0D9488">Reset View</text>

  <!-- Top bar on center content -->
  <rect x="100" y="26" width="218" height="24" fill="white" fill-opacity="0.8"/>
  <text x="114" y="41" font-size="7" font-weight="700" fill="#0F172A">Human Heart</text>
  <text x="114" y="47" font-size="4.5" fill="#64748B">3D Anatomical Model</text>

  <!-- Zoom controls top right of center -->
  <g transform="translate(290, 32)">
    <rect x="0" y="0" width="18" height="14" rx="4" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="5" y="10.5" font-size="9" fill="#64748B">+</text>
    <rect x="0" y="0" width="18" height="14" rx="4" fill="none"/>
  </g>
  <g transform="translate(268, 32)">
    <rect x="0" y="0" width="18" height="14" rx="4" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="6" y="10.5" font-size="9" fill="#64748B">−</text>
  </g>

  <!-- Bottom status bar -->
  <rect x="100" y="278" width="218" height="16" fill="white" fill-opacity="0.7"/>
  <text x="114" y="289" font-size="4.5" fill="#94A3B8">Vertices: 24,831 · Triangles: 49,204</text>
  <text x="304" y="289" text-anchor="end" font-size="4.5" fill="#0D9488">SceneView 3D</text>
</svg>