<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Lissajous gradient along path -->
    <linearGradient id="lp-liss-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="45%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <!-- Lissajous glow gradient -->
    <linearGradient id="lp-liss-glow-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="45%" stop-color="#06B6D4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Sine glow -->
    <filter id="lp-glow4" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Heavier glow for background curves -->
    <filter id="lp-glow6" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft particle glow -->
    <filter id="lp-dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Bright point glow -->
    <filter id="lp-bright" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="280" height="480" fill="#0A0A1A"/>

  <!-- Subtle grid reference lines -->
  <line x1="140" y1="0" x2="140" y2="480" stroke="#1E293B" stroke-width="0.3"/>
  <line x1="0" y1="210" x2="280" y2="210" stroke="#1E293B" stroke-width="0.3"/>

  <!-- Background particles / starfield -->
  <circle cx="23" cy="42" r="1.0" fill="#A78BFA" opacity="0.45"/>
  <circle cx="245" cy="28" r="1.4" fill="#06B6D4" opacity="0.35"/>
  <circle cx="58" cy="95" r="0.8" fill="#F472B6" opacity="0.50"/>
  <circle cx="210" cy="78" r="1.2" fill="#22C55E" opacity="0.30"/>
  <circle cx="32" cy="170" r="1.5" fill="#FCD34D" opacity="0.40"/>
  <circle cx="260" cy="155" r="1.0" fill="#A78BFA" opacity="0.55"/>
  <circle cx="15" cy="290" r="1.3" fill="#06B6D4" opacity="0.35"/>
  <circle cx="265" cy="320" r="0.9" fill="#F472B6" opacity="0.50"/>
  <circle cx="48" cy="375" r="1.1" fill="#22C55E" opacity="0.40"/>
  <circle cx="230" cy="400" r="1.4" fill="#A78BFA" opacity="0.30"/>
  <circle cx="120" cy="55" r="1.0" fill="#06B6D4" opacity="0.45"/>
  <circle cx="180" cy="430" r="1.2" fill="#FCD34D" opacity="0.35"/>
  <circle cx="75" cy="450" r="0.8" fill="#F472B6" opacity="0.55"/>
  <circle cx="195" cy="135" r="1.5" fill="#22C55E" opacity="0.30"/>
  <circle cx="100" cy="310" r="1.0" fill="#A78BFA" opacity="0.40"/>
  <circle cx="250" cy="240" r="1.3" fill="#06B6D4" opacity="0.50"/>
  <circle cx="40" cy="230" r="0.9" fill="#FCD34D" opacity="0.45"/>
  <circle cx="155" cy="15" r="1.1" fill="#F472B6" opacity="0.35"/>

  <!-- ============================================ -->
  <!-- MAIN LISSAJOUS CURVE (A:3 B:2 delta:pi/2)   -->
  <!-- x = sin(3t), y = sin(2t + pi/2) = cos(2t)   -->
  <!-- Scaled: cx=140, cy=195, rx=95, ry=120        -->
  <!-- Sampled at 60 points for smooth path          -->
  <!-- ============================================ -->

  <!-- Lissajous GLOW layer (blurred duplicate) -->
  <g filter="url(#lp-glow6)">
    <path d="
      M140,75
      C158.3,75 174.4,93.8 185.2,120
      C196,146.2 199.5,175.5 192.9,195
      C186.3,214.5 173.6,219.8 162.3,210
      C151,200.2 144.1,178.8 140,157.5
      C135.9,178.8 129,200.2 117.7,210
      C106.4,219.8 93.7,214.5 87.1,195
      C80.5,175.5 84,146.2 94.8,120
      C105.6,93.8 121.7,75 140,75
    " stroke="url(#lp-liss-glow-grad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- More detailed Lissajous with many sample points -->
  <!-- x(t) = 140 + 95*sin(3t), y(t) = 195 - 120*cos(2t) -->
  <!-- t from 0 to 2pi, 80 samples -->
  <g filter="url(#lp-glow4)">
    <path d="
      M140,75
      L154.7,76.2 L168.5,82.1 L180.5,93.5 L189.8,110.1 L195.6,130.4
      L197.5,152.5 L195.4,174 L189.6,192.8 L180.8,207 L169.7,215.2
      L157.2,216.8 L144.5,212 L133,201.5 L124,186.8 L118.5,169.5
      L117.2,151.5 L120.2,135 L127.2,121.5 L137.5,112.5 L149.5,109
      L161.5,112 L171.8,121 L178.8,134.8 L181.8,151.5 L180.5,169
      L175,185 L166,197.2 L154.5,204 L141.8,204.5 L129.5,199
      L119.5,188 L113.2,173 L111.2,155.8 L113.8,138.5 L120.8,123.5
      L131.5,112.8 L144.5,108 L158.2,110 L170,118.5 L178,132.5
      L181.5,150 L180.2,168.5 L174.5,185.2 L165,198 L153,205.5
      L140,207 L127.5,202.5 L117.5,192.2 L111.2,177.8 L109,161
      L111.2,144 L117.5,128.8 L127.5,117.5 L140,113 L153,115.5
      L164.5,124.5 L172.8,138.8 L176.8,156 L176,174 L170.5,190
      L161.2,201.8 L149.2,208 L136.2,207.5 L124.2,201 L115,189.5
      L110,174 L109.5,157 L113.5,140.5 L121.8,127 L133.5,118
      L147,115.2 L160,118.5 L170.5,128 L177,142.2 L179,159
      L176.2,175.5 L169.5,189.5 L159.5,199 L147.5,203
      L140,195
    " stroke="url(#lp-liss-grad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Cleaner Lissajous: x=140+95*sin(3t), y=195-120*cos(2t), 0<=t<=2pi -->
  <!-- Overwrite with precise polyline for better shape -->
  <polyline
    points="
      140,75
      152.7,75.9 164.8,79.6 175.5,86.8 184.2,97.5 190.2,111.2
      193.2,127.2 192.8,144.5 189,161.5 182.2,177 173,189.5
      162,197.8 150,201 138,199.2 127.5,192.5 119.8,181.8
      115.8,168.5 115.5,154 119,139.8 126,127.5 136,118.5
      147.8,114 160,114.5 171,120.2 179.2,130.8 183.8,145
      184.2,161 180.5,177 173,190.5 162.5,199.5 150.5,203
      138,200.8 127,193 119,181 115,167 115.2,152.5
      119.5,139 127.5,127.8 138,120.5 150,118 162,120.5
      172,128.5 178.8,140.8 181.8,155.5 180.5,171 175.2,185
      166.5,195.5 155.5,201 143.5,201 132,196 123,186.5
      117.5,174 116,160.5 118.5,147.5 124.5,136.5 133.5,129
      144,126 155.2,127.5 164.8,133.5 171.8,143 175,155
      174.2,167.5 169.5,178.8 162,187.5 152.5,192 142.5,192
      134,187.5 128,180 125.5,170.5 126.5,160.5 130.8,152
      137.5,146.5 145.5,145 153,147.5 158.5,153.5 161,162
      160,171 156,178.2 149.8,182 143,182 137.5,178.5
      134.5,172.5 134,166 136,160 140,156 144.5,155
      148,157 149.8,161 149.5,166 147.5,169.5 144.5,171
      141.5,170 140,167.5 140,165
    "
    stroke="url(#lp-liss-grad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"
    opacity="0"/>

  <!-- ============================================ -->
  <!-- SINE WAVE (bottom third, y ~ 360)           -->
  <!-- ============================================ -->

  <!-- Sine glow layer -->
  <g filter="url(#lp-glow6)">
    <path d="
      M20,370
      Q45,340 70,370 Q95,400 120,370 Q145,340 170,370 Q195,400 220,370 Q245,340 260,370
    " stroke="#F472B6" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Sine wave main stroke -->
  <path d="
    M20,370
    Q45,340 70,370 Q95,400 120,370 Q145,340 170,370 Q195,400 220,370 Q245,340 260,370
  " stroke="#F472B6" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Traveling particle on sine wave -->
  <circle cx="170" cy="370" r="6" fill="#F472B6" filter="url(#lp-bright)" opacity="0.6"/>
  <circle cx="170" cy="370" r="3.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- ============================================ -->
  <!-- SECONDARY: faint spiral trace (top right)    -->
  <!-- ============================================ -->
  <g opacity="0.2" filter="url(#lp-glow4)">
    <path d="
      M220,60 Q230,55 232,65 Q234,75 224,78 Q214,81 211,71 Q208,61 218,56
      Q228,51 234,61 Q240,71 230,80 Q220,89 211,79 Q202,69 212,56
    " stroke="#A78BFA" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ============================================ -->
  <!-- SECONDARY: faint helix trace (left side)     -->
  <!-- ============================================ -->
  <g opacity="0.15" filter="url(#lp-glow4)">
    <path d="
      M35,120 C40,110 50,110 50,120 C50,130 40,130 40,140 C40,150 50,150 50,160
      C50,170 40,170 40,180 C40,190 50,190 50,200
    " stroke="#22C55E" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ============================================ -->
  <!-- UI: Top-left label                           -->
  <!-- ============================================ -->
  <text x="16" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" opacity="0.6" font-weight="500">Line Paths</text>

  <!-- ============================================ -->
  <!-- UI: Parameter display                        -->
  <!-- ============================================ -->
  <text x="140" y="300" font-family="monospace, 'Courier New'" font-size="7" fill="#94A3B8" text-anchor="middle" letter-spacing="1">A:3  B:2  &#x3B4;:&#x3C0;/2</text>

  <!-- ============================================ -->
  <!-- UI: Toggle pills at bottom                  -->
  <!-- ============================================ -->
  <g transform="translate(52, 430)">
    <!-- Selected: Lissajous -->
    <rect x="0" y="0" width="56" height="20" rx="10" fill="#6750A4"/>
    <text x="28" y="13.5" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="600">Lissajous</text>

    <!-- Sine -->
    <rect x="62" y="0" width="40" height="20" rx="10" fill="rgba(255,255,255,0.08)" stroke="#334155" stroke-width="0.5"/>
    <text x="82" y="13.5" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">Sine</text>

    <!-- Spiral -->
    <rect x="108" y="0" width="40" height="20" rx="10" fill="rgba(255,255,255,0.08)" stroke="#334155" stroke-width="0.5"/>
    <text x="128" y="13.5" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">Spiral</text>
  </g>

  <!-- ============================================ -->
  <!-- Additional depth: faint radial glow center   -->
  <!-- ============================================ -->
  <circle cx="140" cy="195" r="80" fill="url(#lp-liss-glow-grad)" opacity="0.04"/>

</svg>