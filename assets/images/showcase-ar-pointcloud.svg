<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <filter id="pc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Phone frame -->
  <rect x="10" y="10" width="260" height="460" rx="36" fill="#1A1A1A"/>
  <rect x="12" y="12" width="256" height="456" rx="34" fill="#2A2A2A"/>
  <rect x="24" y="32" width="232" height="416" rx="6" fill="#1A1A2E"/>
  <rect x="90" y="14" width="100" height="22" rx="11" fill="#1A1A1A"/>
  <!-- Camera feed simulation — dark room -->
  <rect x="24" y="32" width="232" height="320" fill="#1C1917"/>
  <!-- Wall -->
  <rect x="24" y="32" width="232" height="180" fill="#292524"/>
  <!-- Floor -->
  <rect x="24" y="212" width="232" height="140" fill="#1C1917"/>
  <!-- Furniture silhouettes -->
  <rect x="40" y="140" width="80" height="70" rx="4" fill="#292524" stroke="#3F3F46" stroke-width="0.5"/>
  <rect x="160" y="160" width="60" height="50" rx="4" fill="#292524" stroke="#3F3F46" stroke-width="0.5"/>
  <!-- AR Point cloud — scattered glowing dots -->
  <g filter="url(#pc-glow)">
    <!-- Dense cluster on furniture -->
    <circle cx="55" cy="155" r="2" fill="#22D3EE"/><circle cx="68" cy="148" r="1.5" fill="#06B6D4"/>
    <circle cx="80" cy="162" r="2" fill="#22D3EE"/><circle cx="92" cy="150" r="1.5" fill="#67E8F9"/>
    <circle cx="72" cy="170" r="1.5" fill="#06B6D4"/><circle cx="60" cy="178" r="2" fill="#22D3EE"/>
    <circle cx="85" cy="175" r="1.5" fill="#67E8F9"/><circle cx="100" cy="165" r="2" fill="#06B6D4"/>
    <circle cx="48" cy="165" r="1.5" fill="#22D3EE"/><circle cx="75" cy="145" r="2" fill="#67E8F9"/>
    <circle cx="110" cy="155" r="1.5" fill="#06B6D4"/><circle cx="95" cy="185" r="2" fill="#22D3EE"/>
    <circle cx="65" cy="190" r="1.5" fill="#67E8F9"/><circle cx="50" cy="195" r="2" fill="#06B6D4"/>
    <!-- Second furniture cluster -->
    <circle cx="170" cy="168" r="2" fill="#22D3EE"/><circle cx="185" cy="175" r="1.5" fill="#06B6D4"/>
    <circle cx="195" cy="165" r="2" fill="#67E8F9"/><circle cx="178" cy="180" r="1.5" fill="#22D3EE"/>
    <circle cx="205" cy="172" r="2" fill="#06B6D4"/><circle cx="168" cy="192" r="1.5" fill="#67E8F9"/>
    <circle cx="190" cy="188" r="2" fill="#22D3EE"/><circle cx="210" cy="185" r="1.5" fill="#06B6D4"/>
    <!-- Floor points (sparser) -->
    <circle cx="80" cy="230" r="1.5" fill="#06B6D4" opacity="0.6"/>
    <circle cx="120" cy="240" r="1.5" fill="#22D3EE" opacity="0.5"/>
    <circle cx="160" cy="235" r="1.5" fill="#67E8F9" opacity="0.6"/>
    <circle cx="200" cy="245" r="1.5" fill="#06B6D4" opacity="0.5"/>
    <circle cx="100" cy="260" r="1.5" fill="#22D3EE" opacity="0.4"/>
    <circle cx="140" cy="270" r="1.5" fill="#67E8F9" opacity="0.5"/>
    <circle cx="180" cy="265" r="1.5" fill="#06B6D4" opacity="0.4"/>
    <circle cx="60" cy="255" r="1.5" fill="#22D3EE" opacity="0.4"/>
    <circle cx="220" cy="258" r="1.5" fill="#67E8F9" opacity="0.5"/>
    <!-- Wall points (sparse) -->
    <circle cx="70" cy="80" r="1.5" fill="#06B6D4" opacity="0.4"/>
    <circle cx="130" cy="90" r="1.5" fill="#22D3EE" opacity="0.3"/>
    <circle cx="190" cy="75" r="1.5" fill="#67E8F9" opacity="0.4"/>
    <circle cx="100" cy="100" r="1.5" fill="#06B6D4" opacity="0.3"/>
    <circle cx="210" cy="105" r="1.5" fill="#22D3EE" opacity="0.3"/>
    <circle cx="150" cy="120" r="1.5" fill="#67E8F9" opacity="0.4"/>
    <!-- Corner/edge features -->
    <circle cx="40" cy="140" r="2.5" fill="#22D3EE" opacity="0.8"/>
    <circle cx="120" cy="140" r="2.5" fill="#22D3EE" opacity="0.8"/>
    <circle cx="40" cy="210" r="2.5" fill="#06B6D4" opacity="0.7"/>
    <circle cx="120" cy="210" r="2.5" fill="#06B6D4" opacity="0.7"/>
    <circle cx="160" cy="160" r="2.5" fill="#22D3EE" opacity="0.8"/>
    <circle cx="220" cy="160" r="2.5" fill="#22D3EE" opacity="0.8"/>
    <circle cx="160" cy="210" r="2.5" fill="#06B6D4" opacity="0.7"/>
    <circle cx="220" cy="210" r="2.5" fill="#06B6D4" opacity="0.7"/>
  </g>
  <!-- Status overlay -->
  <rect x="34" y="42" width="212" height="28" rx="14" fill="rgba(0,0,0,0.5)"/>
  <circle cx="52" cy="56" r="6" fill="#22D3EE" filter="url(#pc-glow)"/>
  <text x="66" y="60" font-family="system-ui" font-size="9" fill="white" font-weight="600">ARCore Active</text>
  <text x="232" y="60" font-family="system-ui" font-size="8" fill="white" text-anchor="end" opacity="0.7">42 features</text>
  <!-- Title bar -->
  <rect x="34" y="76" width="212" height="24" rx="12" fill="rgba(6,182,212,0.1)"/>
  <text x="140" y="92" font-family="system-ui" font-size="9" fill="#67E8F9" text-anchor="middle" font-weight="600">Point Cloud Visualization</text>
  <!-- Stats panel -->
  <rect x="34" y="300" width="212" height="40" rx="14" fill="rgba(0,0,0,0.5)"/>
  <g transform="translate(50, 312)">
    <text x="0" y="0" font-family="system-ui" font-size="7" fill="#94A3B8">Points</text>
    <text x="0" y="14" font-family="system-ui" font-size="11" fill="#22D3EE" font-weight="700">1,247</text>
    <text x="65" y="0" font-family="system-ui" font-size="7" fill="#94A3B8">Confidence</text>
    <text x="65" y="14" font-family="system-ui" font-size="11" fill="#22C55E" font-weight="700">0.87</text>
    <text x="140" y="0" font-family="system-ui" font-size="7" fill="#94A3B8">FPS</text>
    <text x="140" y="14" font-family="system-ui" font-size="11" fill="#FDE68A" font-weight="700">30</text>
  </g>
  <!-- Controls -->
  <g transform="translate(34, 360)">
    <text x="0" y="0" font-family="system-ui" font-size="9" fill="#94A3B8" font-weight="700">DISPLAY MODE</text>
    <g transform="translate(0, 10)">
      <rect x="0" y="0" width="68" height="26" rx="13" fill="rgba(6,182,212,0.2)" stroke="#06B6D4" stroke-width="1"/>
      <text x="34" y="17" font-family="system-ui" font-size="8" fill="#67E8F9" text-anchor="middle" font-weight="600">Points</text>
      <rect x="74" y="0" width="68" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="#64748B"/>
      <text x="108" y="17" font-family="system-ui" font-size="8" fill="#94A3B8" text-anchor="middle">Mesh</text>
      <rect x="148" y="0" width="68" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="#64748B"/>
      <text x="182" y="17" font-family="system-ui" font-size="8" fill="#94A3B8" text-anchor="middle">Planes</text>
    </g>
  </g>
  <!-- Point size slider -->
  <g transform="translate(34, 408)">
    <text x="0" y="0" font-family="system-ui" font-size="8" fill="#94A3B8" font-weight="600">POINT SIZE</text>
    <rect x="0" y="8" width="160" height="4" rx="2" fill="#334155"/>
    <rect x="0" y="8" width="80" height="4" rx="2" fill="#06B6D4"/>
    <circle cx="80" cy="10" r="7" fill="white" stroke="#06B6D4" stroke-width="2"/>
    <text x="180" y="14" font-family="system-ui" font-size="9" fill="white" font-weight="600">3px</text>
  </g>
  <!-- Color by -->
  <g transform="translate(34, 434)">
    <text x="0" y="0" font-family="system-ui" font-size="8" fill="#94A3B8" font-weight="600">COLOR BY</text>
    <rect x="60" y="-8" width="68" height="18" rx="9" fill="rgba(6,182,212,0.2)" stroke="#06B6D4" stroke-width="0.5"/>
    <text x="94" y="6" font-family="system-ui" font-size="7" fill="#67E8F9" text-anchor="middle" font-weight="600">Confidence</text>
  </g>
  <rect x="100" y="454" width="80" height="4" rx="2" fill="#666"/>
</svg>
