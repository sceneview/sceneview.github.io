<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 400">
  <defs>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </linearGradient>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="carRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="pillBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#162032"/>
    </linearGradient>
    <linearGradient id="climateBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162032"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="toggleOn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="batteryBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="82%" stop-color="#22C55E"/>
      <stop offset="82%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="cGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="headlightGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadowDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feFlood flood-color="#000" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="10" y="10" width="200" height="380" rx="20"/>
    </clipPath>
  </defs>

  <!-- Phone bezel -->
  <rect x="0" y="0" width="220" height="400" rx="24" fill="url(#bezelGrad)"/>
  <!-- Screen -->
  <rect x="6" y="6" width="208" height="388" rx="22" fill="url(#phoneBg)"/>

  <g clip-path="url(#screenClip)">

    <!-- Status bar -->
    <g>
      <text x="20" y="26" font-family="system-ui" font-size="9" font-weight="600" fill="#94A3B8">9:41</text>
      <!-- Signal bars -->
      <rect x="168" y="17" width="2" height="5" rx="0.5" fill="#94A3B8"/>
      <rect x="172" y="15" width="2" height="7" rx="0.5" fill="#94A3B8"/>
      <rect x="176" y="13" width="2" height="9" rx="0.5" fill="#94A3B8"/>
      <rect x="180" y="11" width="2" height="11" rx="0.5" fill="#94A3B8"/>
      <!-- Battery -->
      <rect x="188" y="14" width="16" height="8" rx="2" fill="none" stroke="#94A3B8" stroke-width="0.8"/>
      <rect x="204" y="16" width="2" height="4" rx="0.5" fill="#94A3B8"/>
      <rect x="190" y="16" width="12" height="4" rx="1" fill="#22C55E"/>
    </g>

    <!-- Title -->
    <text x="110" y="50" font-family="system-ui" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">My Vehicle</text>
    <text x="110" y="64" font-family="system-ui" font-size="9" fill="#06B6D4" text-anchor="middle">Connected</text>

    <!-- === TOP-DOWN CAR ILLUSTRATION === -->
    <g transform="translate(110, 138)" filter="url(#shadowDrop)">
      <!-- Car shadow -->
      <ellipse cx="0" cy="5" rx="35" ry="58" fill="#000" opacity="0.15"/>

      <!-- Car body -->
      <rect x="-30" y="-55" width="60" height="110" rx="22" fill="url(#carBody)" stroke="#475569" stroke-width="0.5"/>

      <!-- Roof / cabin (glass area) -->
      <rect x="-20" y="-28" width="40" height="50" rx="14" fill="url(#carRoof)" opacity="0.6"/>
      <!-- Roof line -->
      <rect x="-16" y="-20" width="32" height="34" rx="10" fill="#0F172A" opacity="0.3" stroke="#475569" stroke-width="0.3"/>

      <!-- Front windshield -->
      <path d="M -18,-28 Q -18,-36 -10,-38 L 10,-38 Q 18,-36 18,-28 Z" fill="#1E293B" stroke="#475569" stroke-width="0.3"/>

      <!-- Rear windshield -->
      <path d="M -16,22 Q -16,28 -8,30 L 8,30 Q 16,28 16,22 Z" fill="#1E293B" stroke="#475569" stroke-width="0.3"/>

      <!-- Headlights -->
      <rect x="-24" y="-50" width="12" height="5" rx="2.5" fill="#06B6D4" opacity="0.8" filter="url(#headlightGlow)"/>
      <rect x="12" y="-50" width="12" height="5" rx="2.5" fill="#06B6D4" opacity="0.8" filter="url(#headlightGlow)"/>

      <!-- Taillights -->
      <rect x="-24" y="45" width="10" height="4" rx="2" fill="#EF4444" opacity="0.7"/>
      <rect x="14" y="45" width="10" height="4" rx="2" fill="#EF4444" opacity="0.7"/>

      <!-- Wheels -->
      <ellipse cx="-30" cy="-30" rx="5" ry="9" fill="#111827" stroke="#374151" stroke-width="0.8"/>
      <ellipse cx="30" cy="-30" rx="5" ry="9" fill="#111827" stroke="#374151" stroke-width="0.8"/>
      <ellipse cx="-30" cy="30" rx="5" ry="9" fill="#111827" stroke="#374151" stroke-width="0.8"/>
      <ellipse cx="30" cy="30" rx="5" ry="9" fill="#111827" stroke="#374151" stroke-width="0.8"/>
      <!-- Wheel rims -->
      <ellipse cx="-30" cy="-30" rx="2.5" ry="5" fill="#1E293B"/>
      <ellipse cx="30" cy="-30" rx="2.5" ry="5" fill="#1E293B"/>
      <ellipse cx="-30" cy="30" rx="2.5" ry="5" fill="#1E293B"/>
      <ellipse cx="30" cy="30" rx="2.5" ry="5" fill="#1E293B"/>

      <!-- Side mirrors -->
      <ellipse cx="-33" cy="-22" rx="4" ry="3" fill="#334155" stroke="#475569" stroke-width="0.3"/>
      <ellipse cx="33" cy="-22" rx="4" ry="3" fill="#334155" stroke="#475569" stroke-width="0.3"/>

      <!-- Center line detail -->
      <line x1="0" y1="-44" x2="0" y2="-38" stroke="#475569" stroke-width="0.5"/>
    </g>

    <!-- Status below car -->
    <text x="110" y="212" font-family="system-ui" font-size="10" fill="#94A3B8" text-anchor="middle">Parked</text>
    <text x="110" y="224" font-family="system-ui" font-size="9" fill="#64748B" text-anchor="middle">·</text>

    <!-- Battery bar -->
    <g transform="translate(40, 228)">
      <rect x="0" y="0" width="140" height="6" rx="3" fill="#1E293B"/>
      <rect x="0" y="0" width="115" height="6" rx="3" fill="#22C55E" opacity="0.8"/>
      <text x="70" y="16" font-family="system-ui" font-size="9" fill="#22C55E" font-weight="600" text-anchor="middle">Battery 82%</text>
    </g>

    <!-- === ACTION BUTTONS === -->
    <g transform="translate(16, 258)">
      <!-- Lock -->
      <g>
        <rect x="0" y="0" width="56" height="34" rx="10" fill="url(#pillBg)" stroke="#1E293B" stroke-width="0.5"/>
        <!-- Lock icon -->
        <rect x="22" y="6" width="12" height="9" rx="2" fill="none" stroke="#06B6D4" stroke-width="1.2"/>
        <path d="M 25,6 L 25,3 Q 25,-1 28,-1 Q 31,-1 31,3 L 31,6" fill="none" stroke="#06B6D4" stroke-width="1.2" stroke-linecap="round"/>
        <text x="28" y="28" font-family="system-ui" font-size="7.5" fill="#94A3B8" text-anchor="middle">Lock</text>
      </g>

      <!-- Climate -->
      <g transform="translate(64, 0)">
        <rect x="0" y="0" width="56" height="34" rx="10" fill="url(#pillBg)" stroke="#06B6D4" stroke-width="0.5" stroke-opacity="0.5"/>
        <!-- Snowflake / fan icon -->
        <circle cx="28" cy="10" r="5" fill="none" stroke="#06B6D4" stroke-width="1"/>
        <line x1="28" y1="5" x2="28" y2="15" stroke="#06B6D4" stroke-width="0.8"/>
        <line x1="23" y1="10" x2="33" y2="10" stroke="#06B6D4" stroke-width="0.8"/>
        <text x="28" y="28" font-family="system-ui" font-size="7.5" fill="#06B6D4" text-anchor="middle">Climate</text>
      </g>

      <!-- Trunk -->
      <g transform="translate(128, 0)">
        <rect x="0" y="0" width="56" height="34" rx="10" fill="url(#pillBg)" stroke="#1E293B" stroke-width="0.5"/>
        <!-- Trunk icon -->
        <rect x="19" y="5" width="18" height="12" rx="2" fill="none" stroke="#94A3B8" stroke-width="1"/>
        <line x1="19" y1="10" x2="37" y2="10" stroke="#94A3B8" stroke-width="0.8"/>
        <text x="28" y="28" font-family="system-ui" font-size="7.5" fill="#94A3B8" text-anchor="middle">Trunk</text>
      </g>
    </g>

    <!-- === CLIMATE PANEL === -->
    <g transform="translate(16, 304)">
      <rect x="0" y="0" width="188" height="52" rx="12" fill="url(#climateBg)" stroke="#1E293B" stroke-width="0.5"/>

      <text x="12" y="16" font-family="system-ui" font-size="8" fill="#64748B" font-weight="600" letter-spacing="0.5">CLIMATE CONTROL</text>

      <!-- Temperature -->
      <text x="70" y="40" font-family="system-ui" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">22°C</text>

      <!-- Down arrow -->
      <g transform="translate(28, 28)">
        <circle cx="0" cy="6" r="8" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
        <polyline points="-3,4 0,8 3,4" fill="none" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- Up arrow -->
      <g transform="translate(112, 28)">
        <circle cx="0" cy="6" r="8" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
        <polyline points="-3,8 0,4 3,8" fill="none" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- A/C Toggle -->
      <g transform="translate(138, 24)">
        <rect x="0" y="0" width="38" height="18" rx="9" fill="url(#toggleOn)" filter="url(#cGlow)"/>
        <circle cx="26" cy="9" r="6.5" fill="#FFFFFF"/>
        <text x="19" y="28" font-family="system-ui" font-size="7" fill="#06B6D4" text-anchor="middle" font-weight="600">A/C On</text>
      </g>
    </g>

    <!-- === BOTTOM NAV === -->
    <g transform="translate(0, 366)">
      <rect x="6" y="0" width="208" height="28" fill="#0A0F1E"/>
      <line x1="6" y1="0" x2="214" y2="0" stroke="#1E293B" stroke-width="0.5"/>

      <!-- Home (active) -->
      <g transform="translate(35, 6)">
        <circle cx="0" cy="5" r="3" fill="#06B6D4" filter="url(#cGlow)"/>
        <text x="0" y="16" font-family="system-ui" font-size="6.5" fill="#06B6D4" text-anchor="middle">Home</text>
      </g>

      <!-- Map -->
      <g transform="translate(80, 6)">
        <circle cx="0" cy="5" r="3" fill="#334155"/>
        <text x="0" y="16" font-family="system-ui" font-size="6.5" fill="#64748B" text-anchor="middle">Map</text>
      </g>

      <!-- Charge -->
      <g transform="translate(130, 6)">
        <circle cx="0" cy="5" r="3" fill="#334155"/>
        <text x="0" y="16" font-family="system-ui" font-size="6.5" fill="#64748B" text-anchor="middle">Charge</text>
      </g>

      <!-- Settings -->
      <g transform="translate(180, 6)">
        <circle cx="0" cy="5" r="3" fill="#334155"/>
        <text x="0" y="16" font-family="system-ui" font-size="6.5" fill="#64748B" text-anchor="middle">Settings</text>
      </g>
    </g>
  </g>

  <!-- Phone notch / camera -->
  <rect x="85" y="6" width="50" height="4" rx="2" fill="#111111"/>
</svg>