<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <!-- Background -->
  <rect width="600" height="340" rx="24" fill="#FFFBFE"/>

  <!-- Subtle decorative background circle -->
  <circle cx="340" cy="155" r="160" fill="#F4EFF4" opacity="0.2"/>

  <!-- === ABSTRACT HEADSET (icon-like) === -->
  <rect x="120" y="120" width="160" height="70" rx="35" fill="#E6E1E5"/>
  <!-- Left lens -->
  <circle cx="180" cy="155" r="22" fill="#D0BCFF" opacity="0.3"/>
  <!-- Right lens -->
  <circle cx="240" cy="155" r="22" fill="#D0BCFF" opacity="0.3"/>

  <!-- === DOTTED PROJECTION LINES === -->
  <line x1="280" y1="140" x2="370" y2="105" stroke="#D0BCFF" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>
  <line x1="280" y1="155" x2="390" y2="155" stroke="#EFB8C8" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>
  <line x1="280" y1="170" x2="380" y2="210" stroke="#B4C5E4" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>

  <!-- === FLOATING SPATIAL ELEMENTS === -->

  <!-- Floating panel — rounded square -->
  <rect x="360" y="80" width="48" height="48" rx="12" fill="#D0BCFF"/>

  <!-- 3D object — circle -->
  <circle cx="400" cy="155" r="22" fill="#EFB8C8"/>

  <!-- UI element — diamond -->
  <rect x="372" y="202" width="28" height="28" rx="4" fill="#B4C5E4" transform="rotate(45 386 216)"/>

  <!-- === BOTTOM TEXT === -->
  <text x="300" y="296" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#6750A4">Spatial computing</text>
  <text x="300" y="312" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#625B71">XR headsets</text>
</svg>