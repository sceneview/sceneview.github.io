<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Connection lines (light purple, rounded) -->
  <!-- Scene -> ModelNode -->
  <path d="M 240 62 C 240 90, 130 90, 130 118" fill="none" stroke="#DDD6FE" stroke-width="3" stroke-linecap="round"/>
  <!-- Scene -> LightNode -->
  <path d="M 240 62 C 240 90, 240 90, 240 118" fill="none" stroke="#DDD6FE" stroke-width="3" stroke-linecap="round"/>
  <!-- Scene -> AnchorNode -->
  <path d="M 240 62 C 240 90, 358 90, 358 118" fill="none" stroke="#DDD6FE" stroke-width="3" stroke-linecap="round"/>
  <!-- AnchorNode -> child ModelNode -->
  <path d="M 358 152 C 358 176, 370 176, 370 200" fill="none" stroke="#DDD6FE" stroke-width="3" stroke-linecap="round"/>

  <!-- Root: Scene { } -->
  <g filter="url(#shadow)">
    <rect x="172" y="28" width="136" height="36" rx="9999" ry="9999" fill="#7B61FF"/>
    <!-- Compose icon (diamond/layers) -->
    <g transform="translate(188, 40)">
      <polygon points="6,0 12,6 6,12 0,6" fill="rgba(255,255,255,0.85)" transform="scale(0.9)"/>
      <polygon points="6,3 12,9 6,15 0,9" fill="rgba(255,255,255,0.5)" transform="scale(0.9)"/>
    </g>
    <text x="240" y="51" text-anchor="middle" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">Scene { }</text>
  </g>

  <!-- ModelNode (left) -->
  <g filter="url(#shadow)">
    <rect x="62" y="118" width="136" height="34" rx="9999" ry="9999" fill="#F97316"/>
    <!-- 3D cube icon -->
    <g transform="translate(76, 127)">
      <path d="M8 0 L16 4 L16 12 L8 16 L0 12 L0 4 Z" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M0 4 L8 8 L16 4" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linejoin="round"/>
      <line x1="8" y1="8" x2="8" y2="16" stroke="rgba(255,255,255,0.9)" stroke-width="1.4"/>
    </g>
    <text x="138" y="140" text-anchor="middle" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#fff">ModelNode</text>
  </g>

  <!-- LightNode (center) -->
  <g filter="url(#shadow)">
    <rect x="175" y="118" width="130" height="34" rx="9999" ry="9999" fill="#EAB308"/>
    <!-- Sun icon -->
    <g transform="translate(192, 128)">
      <circle cx="7" cy="7" r="3.5" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.4"/>
      <line x1="7" y1="0" x2="7" y2="2" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="7" y1="12" x2="7" y2="14" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="0" y1="7" x2="2" y2="7" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="12" y1="7" x2="14" y2="7" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="2" x2="3.5" y2="3.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="10.5" y1="10.5" x2="12" y2="12" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="12" x2="3.5" y2="10.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="10.5" y1="3.5" x2="12" y2="2" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
    </g>
    <text x="248" y="140" text-anchor="middle" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#fff">LightNode</text>
  </g>

  <!-- AnchorNode (right) -->
  <g filter="url(#shadow)">
    <rect x="288" y="118" width="140" height="34" rx="9999" ry="9999" fill="#0D9488"/>
    <!-- Anchor icon -->
    <g transform="translate(304, 127)">
      <circle cx="7" cy="4" r="2.5" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.4"/>
      <line x1="7" y1="6.5" x2="7" y2="15" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M2 11 C2 14, 7 15, 7 15 C7 15, 12 14, 12 11" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="4" y1="9" x2="10" y2="9" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round"/>
    </g>
    <text x="367" y="140" text-anchor="middle" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#fff">AnchorNode</text>
  </g>

  <!-- Child ModelNode (nested under AnchorNode) -->
  <g filter="url(#shadow)">
    <rect x="306" y="200" width="120" height="30" rx="9999" ry="9999" fill="#F97316" opacity="0.88"/>
    <!-- Small 3D cube icon -->
    <g transform="translate(318, 208)">
      <path d="M6 0 L12 3 L12 9 L6 12 L0 9 L0 3 Z" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M0 3 L6 6 L12 3" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.2" stroke-linejoin="round"/>
      <line x1="6" y1="6" x2="6" y2="12" stroke="rgba(255,255,255,0.85)" stroke-width="1.2"/>
    </g>
    <text x="374" y="220" text-anchor="middle" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">ModelNode</text>
  </g>

  <!-- Annotation: "Same as Column { Row { } }" -->
  <line x1="30" y1="152" x2="60" y2="138" stroke="#B4A7F5" stroke-width="1" stroke-dasharray="3,3" stroke-linecap="round"/>
  <text x="12" y="166" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#8B7DCF" font-style="italic">Same as Column { Row { } }</text>

  <!-- Bottom tagline -->
  <text x="240" y="268" text-anchor="middle" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="11.5" fill="#7B61FF" font-weight="500" letter-spacing="0.5">Declarative · Composable · Lifecycle-managed</text>

  <!-- Subtle nesting bracket hint -->
  <text x="240" y="288" text-anchor="middle" font-family="'Google Sans', 'Inter', system-ui, sans-serif" font-size="9.5" fill="#A5A0C8" letter-spacing="0.3">Nodes are composables — just like any Compose UI</text>
</svg>