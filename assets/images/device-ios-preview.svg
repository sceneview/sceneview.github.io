<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Screen background -->
    <linearGradient id="ios-bg" x1="140" y1="0" x2="140" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8F8FA"/>
      <stop offset="100%" stop-color="#EFEFEF"/>
    </linearGradient>
    <!-- Viewport gradient -->
    <linearGradient id="ios-viewport" x1="140" y1="120" x2="140" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F0F0F2"/>
    </linearGradient>
    <!-- Sneaker body gradient -->
    <linearGradient id="sneaker-body" x1="100" y1="200" x2="180" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D1D1F"/>
      <stop offset="100%" stop-color="#3A3A3C"/>
    </linearGradient>
    <!-- Sneaker sole -->
    <linearGradient id="sneaker-sole" x1="100" y1="255" x2="180" y2="265" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E5E5EA"/>
      <stop offset="100%" stop-color="#D1D1D6"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="ios-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="ios-shadow-lg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <!-- Sneaker shadow on surface -->
    <radialGradient id="sneaker-shadow" cx="140" cy="275" r="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- iPhone frame -->
  <rect x="4" y="4" width="272" height="472" rx="40" fill="#1D1D1F"/>
  <!-- Screen -->
  <rect x="10" y="10" width="260" height="460" rx="36" fill="url(#ios-bg)"/>

  <!-- Dynamic Island -->
  <rect x="104" y="16" width="72" height="24" rx="12" fill="#1D1D1F"/>
  <!-- Camera dot -->
  <circle cx="152" cy="28" r="4" fill="#2C2C2E"/>
  <circle cx="152" cy="28" r="2" fill="#1a1a2e" opacity="0.6"/>

  <!-- Status bar -->
  <text x="32" y="32" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D1D1F">9:41</text>
  <!-- Signal + battery -->
  <g transform="translate(220, 24)">
    <rect x="0" y="0" width="3" height="6" rx="0.5" fill="#1D1D1F" opacity="0.4"/>
    <rect x="4" y="-2" width="3" height="8" rx="0.5" fill="#1D1D1F" opacity="0.6"/>
    <rect x="8" y="-4" width="3" height="10" rx="0.5" fill="#1D1D1F" opacity="0.8"/>
    <rect x="12" y="-6" width="3" height="12" rx="0.5" fill="#1D1D1F"/>
    <!-- Battery -->
    <rect x="20" y="-2" width="18" height="10" rx="2" fill="none" stroke="#1D1D1F" stroke-width="1"/>
    <rect x="38" y="1" width="2" height="4" rx="1" fill="#1D1D1F" opacity="0.4"/>
    <rect x="22" y="0" width="14" height="6" rx="1" fill="#34C759"/>
  </g>

  <!-- Title -->
  <text x="140" y="68" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1D1D1F" text-anchor="middle">SceneView for iOS</text>
  <text x="140" y="84" font-family="system-ui, sans-serif" font-size="10" fill="#8E8E93" text-anchor="middle">Product Viewer</text>

  <!-- v4.0 badge -->
  <g transform="translate(222, 56)">
    <rect width="36" height="18" rx="9" fill="#007AFF" opacity="0.12"/>
    <text x="18" y="13" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#007AFF" text-anchor="middle">v4.0</text>
  </g>

  <!-- 3D Viewport -->
  <rect x="20" y="96" width="240" height="200" rx="16" fill="url(#ios-viewport)" filter="url(#ios-shadow)"/>
  <rect x="20" y="96" width="240" height="200" rx="16" fill="none" stroke="#E5E5EA" stroke-width="0.5"/>

  <!-- 360 rotation hint -->
  <g transform="translate(220, 108)" opacity="0.35">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#8E8E93" stroke-width="1"/>
    <path d="M-4 -6 A8 8 0 1 1 -7 2" fill="none" stroke="#8E8E93" stroke-width="1" stroke-linecap="round"/>
    <path d="M-4 -6 L-7 -4 L-2 -4" fill="#8E8E93"/>
  </g>

  <!-- Sneaker model -->
  <g transform="translate(140, 195)">
    <!-- Ground shadow -->
    <ellipse cx="0" cy="55" rx="50" ry="8" fill="url(#sneaker-shadow)"/>

    <!-- Sole -->
    <path d="M-52 30 Q-55 38 -48 42 L50 42 Q58 38 55 30 Z" fill="url(#sneaker-sole)"/>
    <!-- Sole tread lines -->
    <line x1="-40" y1="38" x2="-30" y2="38" stroke="#C7C7CC" stroke-width="0.5"/>
    <line x1="-20" y1="38" x2="-10" y2="38" stroke="#C7C7CC" stroke-width="0.5"/>
    <line x1="0" y1="38" x2="10" y2="38" stroke="#C7C7CC" stroke-width="0.5"/>
    <line x1="20" y1="38" x2="30" y2="38" stroke="#C7C7CC" stroke-width="0.5"/>
    <line x1="40" y1="38" x2="48" y2="38" stroke="#C7C7CC" stroke-width="0.5"/>
    <!-- Midsole -->
    <path d="M-50 26 Q-52 34 -48 34 L50 34 Q54 34 52 26 Z" fill="white" stroke="#E5E5EA" stroke-width="0.5"/>

    <!-- Upper body -->
    <path d="M-48 26 Q-50 -5 -20 -18 L30 -18 Q55 -5 50 26 Z" fill="url(#sneaker-body)"/>

    <!-- Toe box -->
    <path d="M-48 26 Q-50 10 -40 5 Q-25 -2 -10 2 L-10 26 Z" fill="#2C2C2E"/>

    <!-- Swoosh / accent stripe -->
    <path d="M-35 18 Q-10 0 40 8" fill="none" stroke="#007AFF" stroke-width="3" stroke-linecap="round"/>

    <!-- Collar / ankle area -->
    <path d="M20 -18 Q35 -25 45 -20 Q52 -15 50 -5" fill="none" stroke="#48484A" stroke-width="1.5"/>

    <!-- Tongue -->
    <path d="M5 -18 Q8 -32 18 -35 Q28 -32 30 -18" fill="#3A3A3C" stroke="#48484A" stroke-width="0.5"/>

    <!-- Lace holes -->
    <circle cx="8" cy="-12" r="1.5" fill="#636366"/>
    <circle cx="14" cy="-16" r="1.5" fill="#636366"/>
    <circle cx="20" cy="-12" r="1.5" fill="#636366"/>
    <!-- Laces -->
    <line x1="8" y1="-12" x2="20" y2="-12" stroke="#8E8E93" stroke-width="0.8"/>
    <line x1="10" y1="-14" x2="18" y2="-14" stroke="#8E8E93" stroke-width="0.8"/>

    <!-- Pull tab -->
    <rect x="42" y="-20" width="6" height="10" rx="2" fill="#007AFF"/>
  </g>

  <!-- Segmented Control -->
  <g transform="translate(40, 310)">
    <rect width="200" height="32" rx="8" fill="#E5E5EA"/>
    <!-- Active segment -->
    <rect x="2" y="2" width="64" height="28" rx="7" fill="white" filter="url(#ios-shadow)"/>
    <text x="34" y="21" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1D1D1F" text-anchor="middle">3D</text>
    <text x="100" y="21" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#8E8E93" text-anchor="middle">AR</text>
    <text x="166" y="21" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#8E8E93" text-anchor="middle">Video</text>
  </g>

  <!-- Color dots -->
  <g transform="translate(140, 365)">
    <text x="0" y="-10" font-family="system-ui, sans-serif" font-size="9" fill="#8E8E93" text-anchor="middle">Color</text>
    <circle cx="-48" cy="6" r="10" fill="#1D1D1F" stroke="#007AFF" stroke-width="2"/>
    <!-- Checkmark -->
    <path d="M-52 6 L-49 9 L-44 3" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="-20" cy="6" r="10" fill="#FF3B30"/>
    <circle cx="8" cy="6" r="10" fill="#5856D6"/>
    <circle cx="36" cy="6" r="10" fill="#E5E5EA" stroke="#D1D1D6" stroke-width="1"/>
  </g>

  <!-- View in AR button -->
  <g transform="translate(36, 395)">
    <rect width="208" height="44" rx="12" fill="#007AFF"/>
    <!-- AR icon -->
    <g transform="translate(72, 14)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
      <!-- AR cube inside -->
      <path d="M4 10 L7 8 L10 10 M7 8 L7 4 M4 6 L7 4 L10 6" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Corner brackets -->
      <path d="M-2 4 L-2 -2 L4 -2" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M10 -2 L16 -2 L16 4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="104" y="27" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">View in AR</text>
  </g>

  <!-- Swift + KMP badge -->
  <g transform="translate(20, 448)">
    <rect width="80" height="20" rx="10" fill="#FF9500" opacity="0.15"/>
    <text x="40" y="14" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#FF9500" text-anchor="middle">Swift + KMP</text>
  </g>

  <!-- Home indicator -->
  <rect x="105" y="458" width="70" height="4" rx="2" fill="#1D1D1F" opacity="0.2"/>

  <!-- Outer frame highlight -->
  <rect x="4" y="4" width="272" height="472" rx="40" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
</svg>
