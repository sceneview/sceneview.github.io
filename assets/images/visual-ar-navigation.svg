<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <!-- Navigation arrow glow -->
    <filter id="arrowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft shadow for phone -->
    <filter id="phoneShadow" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#1C1B1F" flood-opacity="0.25"/>
    </filter>
    <!-- Soft shadow for floating cards -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <!-- AR dot glow -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
    <!-- Clip for phone screen -->
    <clipPath id="screenClip">
      <rect x="168" y="28" width="194" height="258" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- ==================== BACKGROUND: REAL WORLD ==================== -->
  <!-- Sky -->
  <rect width="600" height="360" rx="20" ry="20" fill="url(#sky)"/>

  <!-- Ground plane -->
  <path d="M0 220 L600 220 L600 360 L0 360 Z" fill="#D6CFC8"/>
  <!-- Sidewalk lines -->
  <path d="M0 220 L600 220" stroke="#C4BAB0" stroke-width="1.5" opacity="0.5"/>
  <path d="M0 240 L600 240" stroke="#C4BAB0" stroke-width="0.8" opacity="0.3"/>

  <!-- Real-world buildings (left side, behind phone) -->
  <rect x="20" y="120" width="100" height="100" rx="16" ry="16" fill="#F5E6D3"/>
  <rect x="30" y="140" width="20" height="24" rx="4" ry="4" fill="#E8D5C4"/>
  <rect x="60" y="140" width="20" height="24" rx="4" ry="4" fill="#E8D5C4"/>
  <rect x="30" y="175" width="20" height="24" rx="4" ry="4" fill="#E8D5C4"/>
  <rect x="60" y="175" width="20" height="24" rx="4" ry="4" fill="#E8D5C4"/>

  <rect x="60" y="100" width="80" height="120" rx="16" ry="16" fill="#E8D5C4"/>
  <rect x="72" y="118" width="16" height="20" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="96" y="118" width="16" height="20" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="72" y="148" width="16" height="20" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="96" y="148" width="16" height="20" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="72" y="178" width="16" height="20" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="96" y="178" width="16" height="20" rx="3" ry="3" fill="#F5E6D3"/>

  <!-- Real-world buildings (right side, behind phone) -->
  <rect x="460" y="130" width="90" height="90" rx="16" ry="16" fill="#F5E6D3"/>
  <rect x="472" y="148" width="18" height="22" rx="4" ry="4" fill="#E8D5C4"/>
  <rect x="498" y="148" width="18" height="22" rx="4" ry="4" fill="#E8D5C4"/>
  <rect x="472" y="180" width="18" height="22" rx="4" ry="4" fill="#E8D5C4"/>
  <rect x="498" y="180" width="18" height="22" rx="4" ry="4" fill="#E8D5C4"/>

  <rect x="510" y="110" width="75" height="110" rx="16" ry="16" fill="#E8D5C4"/>
  <rect x="522" y="128" width="14" height="18" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="544" y="128" width="14" height="18" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="522" y="156" width="14" height="18" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="544" y="156" width="14" height="18" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="522" y="184" width="14" height="18" rx="3" ry="3" fill="#F5E6D3"/>
  <rect x="544" y="184" width="14" height="18" rx="3" ry="3" fill="#F5E6D3"/>

  <!-- ==================== PHONE (tilted perspective) ==================== -->
  <g transform="translate(265, 168) rotate(-5) translate(-265, -168)" filter="url(#phoneShadow)">
    <!-- Phone body -->
    <rect x="155" y="16" width="220" height="282" rx="24" ry="24" fill="#1C1B1F"/>
    <!-- Screen bezel inset -->
    <rect x="163" y="23" width="204" height="268" rx="16" ry="16" fill="#2A2930"/>

    <!-- ==================== PHONE SCREEN CONTENT ==================== -->
    <g clip-path="url(#screenClip)">
      <!-- Camera feed: sky -->
      <linearGradient id="screenSky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#B8D8F0"/>
        <stop offset="100%" stop-color="#95C8E8"/>
      </linearGradient>
      <rect x="168" y="28" width="194" height="258" fill="url(#screenSky)"/>

      <!-- Camera feed: buildings on screen (matching real world) -->
      <!-- Left building -->
      <rect x="172" y="108" width="52" height="80" rx="10" ry="10" fill="#F5E6D3" opacity="0.9"/>
      <rect x="180" y="120" width="12" height="16" rx="2" ry="2" fill="#E8D5C4"/>
      <rect x="198" y="120" width="12" height="16" rx="2" ry="2" fill="#E8D5C4"/>
      <rect x="180" y="144" width="12" height="16" rx="2" ry="2" fill="#E8D5C4"/>
      <rect x="198" y="144" width="12" height="16" rx="2" ry="2" fill="#E8D5C4"/>

      <!-- Right building -->
      <rect x="308" y="118" width="50" height="70" rx="10" ry="10" fill="#E8D5C4" opacity="0.9"/>
      <rect x="316" y="130" width="10" height="14" rx="2" ry="2" fill="#F5E6D3"/>
      <rect x="332" y="130" width="10" height="14" rx="2" ry="2" fill="#F5E6D3"/>
      <rect x="316" y="152" width="10" height="14" rx="2" ry="2" fill="#F5E6D3"/>
      <rect x="332" y="152" width="10" height="14" rx="2" ry="2" fill="#F5E6D3"/>

      <!-- Camera feed: ground/street -->
      <path d="M168 188 L362 188 L362 286 L168 286 Z" fill="#C4BAB0" opacity="0.7"/>
      <!-- Sidewalk -->
      <path d="M168 188 L362 188" stroke="#B0A89E" stroke-width="1" opacity="0.5"/>

      <!-- ====== AR PLANE DOTS (detected surface) ====== -->
      <g opacity="0.6">
        <circle cx="210" cy="240" r="2" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="230" cy="248" r="1.8" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="250" cy="244" r="2" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="270" cy="250" r="1.8" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="290" cy="242" r="2" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="310" cy="248" r="1.8" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="220" cy="260" r="1.5" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="245" cy="264" r="1.8" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="268" cy="268" r="2" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="295" cy="262" r="1.5" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="235" cy="276" r="1.5" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="260" cy="280" r="1.8" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="285" cy="276" r="1.5" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="200" cy="252" r="1.5" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="320" cy="260" r="1.5" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="240" cy="232" r="1.5" fill="#06B6D4" filter="url(#dotGlow)"/>
        <circle cx="275" cy="234" r="1.5" fill="#06B6D4" filter="url(#dotGlow)"/>
      </g>

      <!-- ====== AR 3D NAVIGATION ARROW ====== -->
      <g filter="url(#arrowGlow)">
        <!-- Arrow shadow on ground -->
        <ellipse cx="265" cy="218" rx="28" ry="6" fill="#10B981" opacity="0.15"/>
        <!-- Arrow body (3D chevron pointing forward/up) -->
        <!-- Main arrow shape -->
        <path d="M265 140 L290 175 L275 175 L275 205 L255 205 L255 175 L240 175 Z"
              fill="#10B981" stroke="#0D9668" stroke-width="1"/>
        <!-- 3D side face (right) -->
        <path d="M290 175 L295 180 L280 180 L275 175 Z" fill="#0D9668" opacity="0.7"/>
        <path d="M280 180 L280 210 L275 205 L275 175 Z" fill="#0D9668" opacity="0.5"/>
        <!-- 3D side face (left) -->
        <path d="M240 175 L235 180 L250 180 L255 175 Z" fill="#0D9668" opacity="0.7"/>
        <path d="M250 180 L250 210 L255 205 L255 175 Z" fill="#0D9668" opacity="0.5"/>
        <!-- Highlight on arrow -->
        <path d="M265 145 L280 170 L270 170 L270 195 L260 195 L260 170 L250 170 Z"
              fill="#34D399" opacity="0.4"/>
      </g>

      <!-- ====== AR DISTANCE PILL "120m" ====== -->
      <g filter="url(#cardShadow)">
        <rect x="234" y="120" width="62" height="24" rx="12" ry="12" fill="white" opacity="0.92"/>
        <text x="265" y="136" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
              font-size="11" font-weight="700" fill="#10B981">120m</text>
      </g>

      <!-- ====== AR STREET NAME CARD ====== -->
      <g filter="url(#cardShadow)">
        <rect x="192" y="92" width="124" height="22" rx="11" ry="11" fill="white" opacity="0.92"/>
        <text x="254" y="107" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
              font-size="9.5" font-weight="600" fill="#1C1B1F">Main Street →</text>
      </g>

      <!-- ====== AR ACTIVE INDICATOR (top of screen) ====== -->
      <g>
        <rect x="172" y="32" width="68" height="18" rx="9" ry="9" fill="#1C1B1F" opacity="0.65"/>
        <circle cx="183" cy="41" r="3.5" fill="#10B981"/>
        <!-- Pulsing ring -->
        <circle cx="183" cy="41" r="5" fill="none" stroke="#10B981" stroke-width="0.8" opacity="0.5"/>
        <text x="193" y="45" font-family="system-ui, -apple-system, sans-serif"
              font-size="8" font-weight="600" fill="white">AR Active</text>
      </g>
    </g>

    <!-- Phone notch / camera -->
    <rect x="240" y="18" width="50" height="8" rx="4" ry="4" fill="#1C1B1F"/>

    <!-- Phone screen border highlight -->
    <rect x="163" y="23" width="204" height="268" rx="16" ry="16"
          fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  </g>

  <!-- ==================== ALIGNMENT LINES (showing AR-real alignment) ==================== -->
  <!-- Subtle dashed lines connecting real buildings to screen buildings -->
  <line x1="140" y1="170" x2="168" y2="155" stroke="#7B61FF" stroke-width="0.7"
        stroke-dasharray="3,3" opacity="0.25"/>
  <line x1="460" y1="175" x2="362" y2="160" stroke="#7B61FF" stroke-width="0.7"
        stroke-dasharray="3,3" opacity="0.25"/>

  <!-- ==================== BOTTOM LABEL ==================== -->
  <text x="300" y="345" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" font-weight="600" fill="#7B61FF">
    ARScene { } — Augmented reality with ARCore
  </text>
</svg>