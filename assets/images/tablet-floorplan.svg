<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="tBezel2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78716C"/>
      <stop offset="100%" stop-color="#57534E"/>
    </linearGradient>
    <linearGradient id="wallTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A8A29E"/>
      <stop offset="100%" stop-color="#78716C"/>
    </linearGradient>
    <filter id="floorShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Tablet frame -->
  <rect x="5" y="10" width="410" height="300" rx="20" ry="20" fill="url(#tBezel2)" stroke="#6B7280" stroke-width="1"/>
  <rect x="7" y="12" width="406" height="296" rx="18" ry="18" fill="none" stroke="#D1D5DB" stroke-width="0.5"/>
  <circle cx="210" cy="18" r="2.5" fill="#4B5563"/>
  <circle cx="210" cy="18" r="1.2" fill="#1F2937"/>

  <!-- Screen -->
  <rect x="18" y="26" width="384" height="268" rx="4" fill="#F5F5F4"/>

  <!-- Top bar -->
  <rect x="18" y="26" width="384" height="28" fill="white"/>
  <text x="32" y="44" font-size="8" font-weight="700" fill="#0F172A">FloorPlan 3D</text>
  <text x="32" y="51" font-size="4.5" fill="#64748B">Apartment 4B · 78 m²</text>

  <!-- Top right buttons -->
  <rect x="340" y="32" width="22" height="16" rx="4" fill="#FFF7ED" stroke="#D97706" stroke-width="0.8"/>
  <text x="351" y="43" text-anchor="middle" font-size="5" font-weight="600" fill="#D97706">Save</text>
  <rect x="368" y="32" width="28" height="16" rx="4" fill="#D97706"/>
  <text x="382" y="43" text-anchor="middle" font-size="5" font-weight="600" fill="white">Share</text>

  <!-- Isometric floor plan -->
  <g transform="translate(200, 155)" filter="url(#floorShadow)">
    <!-- Floor shadow -->
    <polygon points="-130,65 0,130 130,65 0,0" fill="#D6D3D1" fill-opacity="0.3"/>

    <!-- Main floor (isometric rectangle) -->
    <!-- Living room -->
    <polygon points="-120,0 -20,50 60,10 -40,-40" fill="#FEF3C7" stroke="#92400E" stroke-width="0.3"/>

    <!-- Kitchen -->
    <polygon points="-20,50 30,75 110,35 60,10" fill="#ECFCCB" stroke="#92400E" stroke-width="0.3"/>

    <!-- Bedroom -->
    <polygon points="-40,-40 30,-75 100,-40 60,10" fill="#DBEAFE" stroke="#92400E" stroke-width="0.3"/>

    <!-- Bathroom -->
    <polygon points="60,10 100,-40 130,-25 110,35" fill="#E0E7FF" stroke="#92400E" stroke-width="0.3"/>

    <!-- Walls - isometric style (thick lines for outer walls) -->
    <!-- Outer walls -->
    <polygon points="-120,0 -20,50 30,75 110,35 130,-25 100,-40 30,-75 -40,-40" fill="none" stroke="#57534E" stroke-width="3" stroke-linejoin="round"/>

    <!-- Inner walls -->
    <line x1="-20" y1="50" x2="60" y2="10" stroke="#78716C" stroke-width="2.5"/>
    <line x1="60" y1="10" x2="100" y2="-40" stroke="#78716C" stroke-width="2.5"/>
    <line x1="60" y1="10" x2="-40" y2="-40" stroke="#78716C" stroke-width="2.5"/>

    <!-- Doors (gaps in walls) -->
    <line x1="10" y1="33" x2="25" y2="26" stroke="#FEF3C7" stroke-width="3.5"/>
    <line x1="20" y1="-8" x2="35" y2="-15" stroke="#DBEAFE" stroke-width="3.5"/>
    <line x1="70" y1="-5" x2="80" y2="-15" stroke="#E0E7FF" stroke-width="3.5"/>

    <!-- Door swing arcs -->
    <path d="M10,33 Q18,38 25,26" fill="none" stroke="#D97706" stroke-width="0.6" stroke-dasharray="1.5,1"/>
    <path d="M20,-8 Q28,-3 35,-15" fill="none" stroke="#D97706" stroke-width="0.6" stroke-dasharray="1.5,1"/>

    <!-- Furniture: Living room - sofa -->
    <g transform="translate(-75, 5)">
      <!-- Sofa isometric -->
      <polygon points="0,0 20,10 40,0 20,-10" fill="#A78BFA" fill-opacity="0.5" stroke="#7C3AED" stroke-width="0.6"/>
      <polygon points="0,0 0,-4 20,-14 20,-10" fill="#8B5CF6" fill-opacity="0.4"/>
      <!-- Back cushions -->
      <polygon points="0,-4 20,-14 20,-10 0,0" fill="none" stroke="#7C3AED" stroke-width="0.3"/>
    </g>

    <!-- Coffee table -->
    <polygon points="-55,18 -45,23 -35,18 -45,13" fill="#D97706" fill-opacity="0.3" stroke="#B45309" stroke-width="0.5"/>

    <!-- Kitchen - counter -->
    <g transform="translate(35, 42)">
      <polygon points="0,0 18,9 30,3 12,-6" fill="#D1D5DB" stroke="#6B7280" stroke-width="0.6"/>
      <!-- Stovetop circles -->
      <ellipse cx="10" cy="0" rx="2" ry="1" fill="none" stroke="#6B7280" stroke-width="0.4"/>
      <ellipse cx="17" cy="3.5" rx="2" ry="1" fill="none" stroke="#6B7280" stroke-width="0.4"/>
    </g>

    <!-- Kitchen table -->
    <polygon points="10,55 25,62.5 40,55 25,47.5" fill="#D97706" fill-opacity="0.25" stroke="#B45309" stroke-width="0.5"/>

    <!-- Bedroom - bed -->
    <g transform="translate(10, -55)">
      <polygon points="0,0 25,12.5 50,0 25,-12.5" fill="#93C5FD" fill-opacity="0.4" stroke="#3B82F6" stroke-width="0.6"/>
      <!-- Pillow -->
      <polygon points="5,-4 15,1 25,-4 15,-9" fill="#BFDBFE" stroke="#3B82F6" stroke-width="0.4"/>
    </g>

    <!-- Bathroom - bathtub -->
    <g transform="translate(80, -20)">
      <ellipse cx="12" cy="-6" rx="12" ry="7" fill="#C7D2FE" fill-opacity="0.5" stroke="#6366F1" stroke-width="0.6" transform="skewX(-20)"/>
    </g>

    <!-- Room labels -->
    <text x="-50" y="15" font-size="5" font-weight="600" fill="#92400E" text-anchor="middle" transform="rotate(-26, -50, 15)">Living Room</text>
    <text x="50" y="45" font-size="4.5" font-weight="600" fill="#4D7C0F" text-anchor="middle" transform="rotate(-26, 50, 45)">Kitchen</text>
    <text x="35" y="-35" font-size="4.5" font-weight="600" fill="#1D4ED8" text-anchor="middle" transform="rotate(-26, 35, -35)">Bedroom</text>
    <text x="95" y="-10" font-size="4" font-weight="600" fill="#4338CA" text-anchor="middle" transform="rotate(-26, 95, -10)">Bath</text>

    <!-- Wall height extrusion (3D effect) -->
    <!-- Front-left wall height -->
    <polygon points="-120,0 -120,-8 -20,42 -20,50" fill="url(#wallGrad)" fill-opacity="0.6" stroke="#57534E" stroke-width="0.5"/>
    <!-- Front-right wall height -->
    <polygon points="-20,50 -20,42 30,67 30,75" fill="url(#wallGrad)" fill-opacity="0.5" stroke="#57534E" stroke-width="0.5"/>
    <!-- Wall top edge -->
    <line x1="-120" y1="-8" x2="-20" y2="42" stroke="#A8A29E" stroke-width="0.8"/>
    <line x1="-20" y1="42" x2="30" y2="67" stroke="#A8A29E" stroke-width="0.8"/>
  </g>

  <!-- Measurement annotation -->
  <g transform="translate(95, 185)">
    <line x1="0" y1="0" x2="55" y2="27" stroke="#D97706" stroke-width="0.8"/>
    <!-- End caps -->
    <line x1="-2" y1="-3" x2="2" y2="3" stroke="#D97706" stroke-width="0.8"/>
    <line x1="53" y1="24" x2="57" y2="30" stroke="#D97706" stroke-width="0.8"/>
    <!-- Label -->
    <rect x="16" y="6" width="24" height="12" rx="3" fill="white" stroke="#D97706" stroke-width="0.8"/>
    <text x="28" y="15" text-anchor="middle" font-size="5.5" font-weight="700" fill="#D97706">4.2m</text>
  </g>

  <!-- Compass -->
  <g transform="translate(370, 75)">
    <circle cx="0" cy="0" r="14" fill="white" fill-opacity="0.9" stroke="#D1D5DB" stroke-width="0.5"/>
    <polygon points="0,-10 3,-2 0,0 -3,-2" fill="#EF4444"/>
    <polygon points="0,10 3,2 0,0 -3,2" fill="#94A3B8"/>
    <text x="0" y="-13" text-anchor="middle" font-size="4" font-weight="700" fill="#EF4444">N</text>
  </g>

  <!-- Right side info panel -->
  <rect x="345" y="100" width="52" height="85" rx="6" fill="white" fill-opacity="0.95" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="371" y="114" text-anchor="middle" font-size="5.5" font-weight="700" fill="#0F172A">Rooms</text>
  <line x1="351" y1="118" x2="391" y2="118" stroke="#F3F4F6" stroke-width="0.5"/>

  <circle cx="356" cy="128" r="3" fill="#FEF3C7" stroke="#92400E" stroke-width="0.5"/>
  <text x="363" y="130" font-size="4.5" fill="#57534E">Living 32m²</text>

  <circle cx="356" cy="141" r="3" fill="#ECFCCB" stroke="#4D7C0F" stroke-width="0.5"/>
  <text x="363" y="143" font-size="4.5" fill="#57534E">Kitchen 18m²</text>

  <circle cx="356" cy="154" r="3" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="0.5"/>
  <text x="363" y="156" font-size="4.5" fill="#57534E">Bed 20m²</text>

  <circle cx="356" cy="167" r="3" fill="#E0E7FF" stroke="#4338CA" stroke-width="0.5"/>
  <text x="363" y="169" font-size="4.5" fill="#57534E">Bath 8m²</text>

  <!-- Bottom toolbar -->
  <rect x="18" y="270" width="384" height="24" rx="4" fill="white"/>
  <line x1="18" y1="270" x2="402" y2="270" stroke="#E5E7EB" stroke-width="0.5"/>

  <!-- View mode pills -->
  <g transform="translate(155, 275)">
    <rect x="0" y="0" width="28" height="16" rx="8" fill="#D97706"/>
    <text x="14" y="11" text-anchor="middle" font-size="6" font-weight="700" fill="white">3D</text>

    <rect x="34" y="0" width="24" height="16" rx="8" fill="#FFF7ED" stroke="#D97706" stroke-width="0.8"/>
    <text x="46" y="11" text-anchor="middle" font-size="6" font-weight="600" fill="#D97706">AR</text>

    <rect x="64" y="0" width="24" height="16" rx="8" fill="#FFF7ED" stroke="#D97706" stroke-width="0.8"/>
    <text x="76" y="11" text-anchor="middle" font-size="6" font-weight="600" fill="#D97706">2D</text>
  </g>

  <!-- Left side tools -->
  <rect x="28" y="275" width="16" height="14" rx="4" fill="#F5F5F4" stroke="#D1D5DB" stroke-width="0.5"/>
  <text x="36" y="284.5" text-anchor="middle" font-size="6" fill="#57534E">Ed</text>

  <rect x="48" y="275" width="16" height="14" rx="4" fill="#F5F5F4" stroke="#D1D5DB" stroke-width="0.5"/>
  <text x="56" y="284.5" text-anchor="middle" font-size="6" fill="#57534E">Ru</text>

  <!-- Right side -->
  <text x="388" y="285" text-anchor="end" font-size="4.5" fill="#D97706">SceneView 3D</text>

  <!-- Floor level indicator -->
  <g transform="translate(30, 85)">
    <rect x="0" y="0" width="18" height="40" rx="4" fill="white" fill-opacity="0.9" stroke="#E2E8F0" stroke-width="0.5"/>
    <rect x="3" y="3" width="12" height="10" rx="2" fill="#D97706" fill-opacity="0.15" stroke="#D97706" stroke-width="0.6"/>
    <text x="9" y="10.5" text-anchor="middle" font-size="5" font-weight="700" fill="#D97706">1</text>
    <text x="9" y="24" text-anchor="middle" font-size="5" fill="#94A3B8">2</text>
    <text x="9" y="36" text-anchor="middle" font-size="5" fill="#94A3B8">3</text>
  </g>
</svg>