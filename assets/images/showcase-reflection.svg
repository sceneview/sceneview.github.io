<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <linearGradient id="rp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFF1F2"/>
    </linearGradient>
    <linearGradient id="rp-sphere" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F472B6"/><stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <radialGradient id="rp-chrome">
      <stop offset="10%" stop-color="white"/>
      <stop offset="40%" stop-color="#E5E7EB"/>
      <stop offset="70%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </radialGradient>
    <filter id="rp-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#F472B6" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Phone frame -->
  <rect x="10" y="10" width="260" height="460" rx="36" fill="#E5E5E5"/>
  <rect x="12" y="12" width="256" height="456" rx="34" fill="#F5F5F5"/>
  <rect x="24" y="32" width="232" height="416" rx="6" fill="url(#rp-bg)"/>
  <rect x="90" y="14" width="100" height="22" rx="11" fill="#E5E5E5"/>
  <!-- Status -->
  <text x="40" y="50" font-family="system-ui" font-size="10" fill="#666" font-weight="600">9:41</text>
  <!-- Title -->
  <text x="140" y="72" font-family="system-ui" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="700">Reflection Probes</text>
  <!-- 3D Viewport -->
  <rect x="34" y="86" width="212" height="240" rx="24" fill="white" filter="url(#rp-shadow)" stroke="#FED7AA" stroke-width="0.5"/>
  <!-- Chrome sphere — reflects environment -->
  <g transform="translate(100, 160)">
    <circle cx="40" cy="40" r="38" fill="url(#rp-chrome)"/>
    <!-- Reflection highlights -->
    <circle cx="28" cy="28" r="12" fill="white" opacity="0.5"/>
    <circle cx="26" cy="26" r="6" fill="white" opacity="0.7"/>
    <!-- Color reflections from environment -->
    <path d="M55,20 Q65,30 60,50" stroke="#FB923C" stroke-width="3" fill="none" opacity="0.2" stroke-linecap="round"/>
    <path d="M20,55 Q30,65 50,60" stroke="#06B6D4" stroke-width="3" fill="none" opacity="0.2" stroke-linecap="round"/>
    <path d="M60,55 Q55,70 40,72" stroke="#22C55E" stroke-width="2" fill="none" opacity="0.15" stroke-linecap="round"/>
    <!-- Shadow -->
    <ellipse cx="40" cy="85" rx="30" ry="5" fill="#E5E7EB" opacity="0.5"/>
  </g>
  <!-- Smaller matte sphere -->
  <g transform="translate(55, 220)">
    <circle cx="15" cy="15" r="14" fill="url(#rp-sphere)"/>
    <circle cx="11" cy="11" r="4" fill="white" opacity="0.3"/>
    <ellipse cx="15" cy="32" rx="10" ry="3" fill="#E5E7EB" opacity="0.3"/>
  </g>
  <!-- Smaller glass sphere -->
  <g transform="translate(185, 210)">
    <circle cx="15" cy="15" r="14" fill="#ECFEFF" opacity="0.6" stroke="#06B6D4" stroke-width="0.5"/>
    <circle cx="10" cy="10" r="5" fill="white" opacity="0.5"/>
    <circle cx="20" cy="22" r="3" fill="#06B6D4" opacity="0.15"/>
  </g>
  <!-- Zone indicator -->
  <rect x="50" y="100" width="180" height="20" rx="10" fill="rgba(244,114,182,0.08)"/>
  <text x="140" y="114" font-family="system-ui" font-size="8" fill="#F472B6" text-anchor="middle" font-weight="600">Zone: Showroom — IBL Override Active</text>
  <!-- Material picker -->
  <g transform="translate(34, 340)">
    <text x="0" y="0" font-family="system-ui" font-size="9" fill="#666" font-weight="700">MATERIAL</text>
    <g transform="translate(0, 10)">
      <rect x="0" y="0" width="50" height="36" rx="12" fill="#E5E7EB" stroke="#F472B6" stroke-width="1.5"/>
      <circle cx="25" cy="14" r="8" fill="url(#rp-chrome)"/>
      <text x="25" y="32" font-family="system-ui" font-size="6" fill="#666" text-anchor="middle" font-weight="600">Chrome</text>
      <rect x="56" y="0" width="50" height="36" rx="12" fill="#FFF1F2" stroke="#FED7AA"/>
      <circle cx="81" cy="14" r="8" fill="url(#rp-sphere)"/>
      <text x="81" y="32" font-family="system-ui" font-size="6" fill="#666" text-anchor="middle">Matte</text>
      <rect x="112" y="0" width="50" height="36" rx="12" fill="#F0F9FF" stroke="#BAE6FD"/>
      <circle cx="137" cy="14" r="8" fill="#ECFEFF" stroke="#06B6D4" stroke-width="0.5"/>
      <text x="137" y="32" font-family="system-ui" font-size="6" fill="#666" text-anchor="middle">Glass</text>
      <rect x="168" y="0" width="50" height="36" rx="12" fill="#FEF3C7" stroke="#FDE68A"/>
      <circle cx="193" cy="14" r="8" fill="#FCD34D"/>
      <text x="193" y="32" font-family="system-ui" font-size="6" fill="#666" text-anchor="middle">Gold</text>
    </g>
  </g>
  <!-- Roughness/Metallic sliders -->
  <g transform="translate(34, 398)">
    <text x="0" y="0" font-family="system-ui" font-size="8" fill="#94A3B8" font-weight="600">ROUGHNESS</text>
    <rect x="0" y="8" width="100" height="4" rx="2" fill="#FED7AA"/>
    <rect x="0" y="8" width="15" height="4" rx="2" fill="#F472B6"/>
    <circle cx="15" cy="10" r="6" fill="white" stroke="#F472B6" stroke-width="1.5"/>
    <text x="108" y="14" font-family="system-ui" font-size="9" fill="#333" font-weight="600">0.05</text>
  </g>
  <g transform="translate(34, 424)">
    <text x="0" y="0" font-family="system-ui" font-size="8" fill="#94A3B8" font-weight="600">METALLIC</text>
    <rect x="0" y="8" width="100" height="4" rx="2" fill="#E5E7EB"/>
    <rect x="0" y="8" width="95" height="4" rx="2" fill="#9CA3AF"/>
    <circle cx="95" cy="10" r="6" fill="white" stroke="#9CA3AF" stroke-width="1.5"/>
    <text x="108" y="14" font-family="system-ui" font-size="9" fill="#333" font-weight="600">1.0</text>
  </g>
</svg>
