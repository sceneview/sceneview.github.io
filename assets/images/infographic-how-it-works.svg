<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <!-- Warm cream gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBF5"/>
      <stop offset="100%" stop-color="#FFF5F0"/>
    </linearGradient>
    <!-- Card shadow filter -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000012"/>
    </filter>
    <!-- Arrow gradient step 1→2 -->
    <linearGradient id="arrow12" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <!-- Arrow gradient step 2→3 -->
    <linearGradient id="arrow23" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="20" fill="url(#bg)"/>

  <!-- ==================== ARROW 1→2 ==================== -->
  <path d="M262,140 C280,140 282,140 296,140" stroke="url(#arrow12)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <polygon points="296,133 310,140 296,147" fill="#F97316"/>

  <!-- ==================== ARROW 2→3 ==================== -->
  <path d="M508,140 C526,140 528,140 542,140" stroke="url(#arrow23)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <polygon points="542,133 556,140 542,147" fill="#10B981"/>

  <!-- ==================== STEP 1: Write Compose ==================== -->
  <g transform="translate(20, 28)">
    <!-- Card -->
    <rect width="240" height="224" rx="24" fill="white" filter="url(#shadow)"/>
    <!-- Accent top bar -->
    <rect width="240" height="6" rx="3" fill="#7B61FF" y="0"/>

    <!-- Step number circle -->
    <circle cx="36" cy="36" r="16" fill="#7B61FF"/>
    <text x="36" y="41" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-weight="700" font-size="14">1</text>

    <!-- Title -->
    <text x="60" y="41" fill="#1E1B2E" font-family="system-ui, sans-serif" font-weight="700" font-size="16">Write Compose</text>

    <!-- Code editor icon -->
    <g transform="translate(40, 62)">
      <!-- Editor frame -->
      <rect width="160" height="100" rx="16" fill="#F5F0FF" stroke="#E0D4FF" stroke-width="1.5"/>
      <!-- Title bar -->
      <rect width="160" height="22" rx="16" fill="#EDE5FF"/>
      <rect y="16" width="160" height="6" fill="#EDE5FF"/>
      <!-- Window dots -->
      <circle cx="14" cy="11" r="3.5" fill="#F87171"/>
      <circle cx="26" cy="11" r="3.5" fill="#FBBF24"/>
      <circle cx="38" cy="11" r="3.5" fill="#34D399"/>

      <!-- Code lines -->
      <text x="14" y="44" fill="#7B61FF" font-family="monospace" font-weight="700" font-size="13">Scene {</text>
      <rect x="24" y="52" width="60" height="4" rx="2" fill="#C4B5FD"/>
      <rect x="24" y="62" width="80" height="4" rx="2" fill="#DDD6FE"/>
      <rect x="24" y="72" width="50" height="4" rx="2" fill="#C4B5FD"/>
      <text x="14" y="88" fill="#7B61FF" font-family="monospace" font-weight="700" font-size="13">}</text>
    </g>

    <!-- Subtitle -->
    <text x="120" y="190" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="12">Jetpack Compose</text>
    <text x="120" y="206" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="12">declarative 3D &amp; AR</text>
  </g>

  <!-- ==================== STEP 2: Add 3D Nodes ==================== -->
  <g transform="translate(312, 28)">
    <!-- Card -->
    <rect width="194" height="224" rx="24" fill="white" filter="url(#shadow)"/>
    <!-- Accent top bar -->
    <rect width="194" height="6" rx="3" fill="#F97316" y="0"/>

    <!-- Step number circle -->
    <circle cx="36" cy="36" r="16" fill="#F97316"/>
    <text x="36" y="41" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-weight="700" font-size="14">2</text>

    <!-- Title -->
    <text x="60" y="41" fill="#1E1B2E" font-family="system-ui, sans-serif" font-weight="700" font-size="16">Add 3D Nodes</text>

    <!-- Node tree -->
    <g transform="translate(97, 76)">
      <!-- Root node (Scene) -->
      <circle cx="0" cy="0" r="10" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" fill="#F97316" font-family="system-ui, sans-serif" font-weight="700" font-size="8">S</text>

      <!-- Connecting lines -->
      <line x1="-3" y1="10" x2="-40" y2="38" stroke="#FDBA74" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="10" x2="0" y2="38" stroke="#FDBA74" stroke-width="2" stroke-linecap="round"/>
      <line x1="3" y1="10" x2="40" y2="38" stroke="#F9A8D4" stroke-width="2" stroke-linecap="round"/>

      <!-- 3D Cube node -->
      <g transform="translate(-40, 50)">
        <rect x="-16" y="-12" width="32" height="24" rx="6" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
        <!-- Cube icon (isometric) -->
        <path d="M-6,-5 L0,-8 L6,-5 L6,2 L0,5 L-6,2 Z" fill="none" stroke="#F97316" stroke-width="1.2" stroke-linejoin="round"/>
        <line x1="0" y1="-8" x2="0" y2="5" stroke="#F97316" stroke-width="0.8" opacity="0.5"/>
        <line x1="-6" y1="2" x2="6" y2="-5" stroke="#F97316" stroke-width="0.8" opacity="0.5"/>
        <text x="0" y="24" text-anchor="middle" fill="#9A3412" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Model</text>
      </g>

      <!-- Light bulb node -->
      <g transform="translate(0, 50)">
        <rect x="-16" y="-12" width="32" height="24" rx="6" fill="#FFFBEB" stroke="#FBBF24" stroke-width="1.5"/>
        <!-- Bulb icon -->
        <circle cx="0" cy="-3" r="5" fill="none" stroke="#FBBF24" stroke-width="1.3"/>
        <line x1="-2" y1="3" x2="2" y2="3" stroke="#FBBF24" stroke-width="1.3" stroke-linecap="round"/>
        <!-- Rays -->
        <line x1="0" y1="-10" x2="0" y2="-12" stroke="#FBBF24" stroke-width="1" stroke-linecap="round"/>
        <line x1="6" y1="-6" x2="8" y2="-8" stroke="#FBBF24" stroke-width="1" stroke-linecap="round"/>
        <line x1="-6" y1="-6" x2="-8" y2="-8" stroke="#FBBF24" stroke-width="1" stroke-linecap="round"/>
        <text x="0" y="24" text-anchor="middle" fill="#92400E" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Light</text>
      </g>

      <!-- Camera node -->
      <g transform="translate(40, 50)">
        <rect x="-16" y="-12" width="32" height="24" rx="6" fill="#FFF1F2" stroke="#F472B6" stroke-width="1.5"/>
        <!-- Camera icon -->
        <rect x="-7" y="-5" width="10" height="8" rx="2" fill="none" stroke="#F472B6" stroke-width="1.3"/>
        <polygon points="3,-3 8,-6 8,1 3,3" fill="none" stroke="#F472B6" stroke-width="1.3" stroke-linejoin="round"/>
        <text x="0" y="24" text-anchor="middle" fill="#9D174D" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Camera</text>
      </g>
    </g>

    <!-- Subtitle -->
    <text x="97" y="190" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="12">Declarative node tree</text>
    <text x="97" y="206" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="12">models, lights, cameras</text>
  </g>

  <!-- ==================== STEP 3: Ship Everywhere ==================== -->
  <g transform="translate(558, 28)">
    <!-- Card -->
    <rect width="222" height="224" rx="24" fill="white" filter="url(#shadow)"/>
    <!-- Accent top bar -->
    <rect width="222" height="6" rx="3" fill="#10B981" y="0"/>

    <!-- Step number circle -->
    <circle cx="36" cy="36" r="16" fill="#10B981"/>
    <text x="36" y="41" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-weight="700" font-size="14">3</text>

    <!-- Title -->
    <text x="60" y="41" fill="#1E1B2E" font-family="system-ui, sans-serif" font-weight="700" font-size="16">Ship everywhere</text>

    <!-- Device grid -->
    <g transform="translate(111, 120)">

      <!-- Phone -->
      <g transform="translate(-72, -36)">
        <rect x="-10" y="-18" width="20" height="36" rx="4" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <line x1="-4" y1="14" x2="4" y2="14" stroke="#6B7280" stroke-width="1" stroke-linecap="round"/>
        <rect x="-6" y="-13" width="12" height="20" rx="1" fill="#D1FAE5"/>
        <!-- Checkmark -->
        <circle cx="10" cy="-18" r="6" fill="#10B981"/>
        <polyline points="7,-18 9,-16 13,-20" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- Tablet -->
      <g transform="translate(-32, -36)">
        <rect x="-15" y="-12" width="30" height="24" rx="4" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <rect x="-11" y="-8" width="22" height="16" rx="1" fill="#D1FAE5"/>
        <!-- Checkmark -->
        <circle cx="15" cy="-12" r="6" fill="#10B981"/>
        <polyline points="12,-12 14,-10 18,-14" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- Car dash -->
      <g transform="translate(14, -36)">
        <rect x="-20" y="-10" width="40" height="20" rx="6" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <rect x="-15" y="-6" width="30" height="12" rx="2" fill="#D1FAE5"/>
        <!-- Steering wheel hint -->
        <circle cx="0" cy="14" r="4" fill="none" stroke="#D1D5DB" stroke-width="1"/>
        <!-- Checkmark -->
        <circle cx="20" cy="-10" r="6" fill="#10B981"/>
        <polyline points="17,-10 19,-8 23,-12" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- TV -->
      <g transform="translate(-52, 26)">
        <rect x="-18" y="-14" width="36" height="24" rx="3" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <rect x="-14" y="-10" width="28" height="16" rx="1" fill="#D1FAE5"/>
        <line x1="-6" y1="12" x2="6" y2="12" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Checkmark -->
        <circle cx="18" cy="-14" r="6" fill="#10B981"/>
        <polyline points="15,-14 17,-12 21,-16" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- XR Headset -->
      <g transform="translate(14, 26)">
        <rect x="-22" y="-10" width="44" height="20" rx="10" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <!-- Lenses -->
        <circle cx="-8" cy="0" r="5" fill="#D1FAE5" stroke="#9CA3AF" stroke-width="0.8"/>
        <circle cx="8" cy="0" r="5" fill="#D1FAE5" stroke="#9CA3AF" stroke-width="0.8"/>
        <!-- Strap hints -->
        <line x1="-22" y1="-2" x2="-26" y2="-6" stroke="#6B7280" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="22" y1="-2" x2="26" y2="-6" stroke="#6B7280" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Checkmark -->
        <circle cx="22" cy="-10" r="6" fill="#10B981"/>
        <polyline points="19,-10 21,-8 25,-12" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Subtitle -->
    <text x="111" y="190" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="12">Phone, tablet, auto,</text>
    <text x="111" y="206" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="12">TV &amp; XR headsets</text>
  </g>
</svg>