<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <!-- M3 Expressive warm gradient background -->
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="40%" stop-color="#FFF1F2"/>
      <stop offset="70%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#F0FDF4"/>
    </linearGradient>
    <linearGradient id="accent-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="accent-pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="accent-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <linearGradient id="accent-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#7B61FF" flood-opacity="0.15"/>
    </filter>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <clipPath id="phone-screen">
      <rect x="327" y="78" width="146" height="270" rx="4"/>
    </clipPath>
    <clipPath id="tablet-screen">
      <rect x="527" y="108" width="230" height="160" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#hero-bg)"/>

  <!-- Decorative soft blobs -->
  <circle cx="200" cy="100" r="180" fill="#7B61FF" opacity="0.06"/>
  <circle cx="900" cy="400" r="220" fill="#F472B6" opacity="0.06"/>
  <circle cx="1100" cy="80" r="140" fill="#06B6D4" opacity="0.05"/>
  <circle cx="500" cy="450" r="160" fill="#10B981" opacity="0.04"/>

  <!-- Left side: Tagline -->
  <text x="60" y="140" font-family="Google Sans, Roboto, sans-serif" font-size="42" font-weight="800" fill="#1C1B1F" letter-spacing="-1">
    <tspan>3D is just</tspan>
    <tspan x="60" dy="52">Compose UI.</tspan>
  </text>
  <text x="60" y="240" font-family="Google Sans, Roboto, sans-serif" font-size="16" fill="#49454F" letter-spacing="0.2">
    <tspan>One Kotlin codebase. Every screen.</tspan>
    <tspan x="60" dy="24">Phone · Tablet · TV · Car · XR headset · iOS</tspan>
  </text>

  <!-- Platform pills -->
  <rect x="60" y="290" width="90" height="30" rx="15" fill="url(#accent-violet)"/>
  <text x="105" y="310" font-family="Google Sans, Roboto, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Android</text>

  <rect x="158" y="290" width="56" height="30" rx="15" fill="url(#accent-teal)"/>
  <text x="186" y="310" font-family="Google Sans, Roboto, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">XR</text>

  <rect x="222" y="290" width="60" height="30" rx="15" fill="url(#accent-pink)"/>
  <text x="252" y="310" font-family="Google Sans, Roboto, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">iOS</text>

  <!-- Phone mockup -->
  <g filter="url(#soft-shadow)">
    <rect x="315" y="55" width="170" height="320" rx="24" fill="white" stroke="#E7E0EC" stroke-width="1.5"/>
    <!-- Status bar notch -->
    <rect x="370" y="62" width="60" height="6" rx="3" fill="#E7E0EC"/>
    <!-- Screen content: e-commerce product card -->
    <rect x="327" y="78" width="146" height="270" rx="4" fill="#FAFAF8"/>
    <!-- Product image area with 3D object -->
    <rect x="327" y="78" width="146" height="140" fill="#F5F3FF"/>
    <!-- 3D shoe silhouette -->
    <ellipse cx="400" cy="138" rx="40" ry="15" fill="#E7E0EC"/>
    <path d="M370 130 Q380 100 400 105 Q420 100 435 115 Q440 125 430 130 L370 130Z" fill="url(#accent-violet)" opacity="0.8"/>
    <path d="M365 130 Q370 128 400 128 Q430 128 440 130 Q445 135 435 138 L368 138 Q360 135 365 130Z" fill="#6D28D9" opacity="0.5"/>
    <!-- Product info -->
    <rect x="337" y="228" width="80" height="8" rx="4" fill="#1C1B1F" opacity="0.7"/>
    <rect x="337" y="242" width="55" height="6" rx="3" fill="#49454F" opacity="0.4"/>
    <rect x="337" y="256" width="40" height="8" rx="4" fill="#7B61FF"/>
    <!-- Add to cart button -->
    <rect x="337" y="275" width="126" height="32" rx="16" fill="url(#accent-violet)"/>
    <text x="400" y="296" font-family="Google Sans, Roboto, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">View in AR</text>
    <!-- Rotate indicator -->
    <circle cx="400" cy="180" r="14" fill="none" stroke="#7B61FF" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 400 180" to="360 400 180" dur="8s" repeatCount="indefinite"/>
    </circle>
    <!-- Home indicator -->
    <rect x="378" y="358" width="44" height="4" rx="2" fill="#CAC4D0"/>
  </g>

  <!-- Tablet mockup -->
  <g filter="url(#card-shadow)" transform="translate(20, 0)">
    <rect x="500" y="90" width="260" height="185" rx="16" fill="white" stroke="#E7E0EC" stroke-width="1.5"/>
    <!-- Camera dot -->
    <circle cx="505" cy="182" r="3" fill="#E7E0EC"/>
    <!-- Screen: architecture floor plan -->
    <rect x="517" y="102" width="230" height="160" rx="4" fill="#FAFAF8"/>
    <!-- Floor plan grid -->
    <line x1="517" y1="160" x2="747" y2="160" stroke="#E7E0EC" stroke-width="0.5"/>
    <line x1="517" y1="200" x2="747" y2="200" stroke="#E7E0EC" stroke-width="0.5"/>
    <line x1="587" y1="102" x2="587" y2="262" stroke="#E7E0EC" stroke-width="0.5"/>
    <line x1="667" y1="102" x2="667" y2="262" stroke="#E7E0EC" stroke-width="0.5"/>
    <!-- Room with furniture -->
    <rect x="527" y="112" width="55" height="42" rx="3" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1"/>
    <rect x="535" y="118" width="18" height="12" rx="2" fill="#A78BFA" opacity="0.4"/>
    <circle cx="565" cy="128" r="6" fill="#F472B6" opacity="0.3"/>
    <rect x="597" y="112" width="65" height="42" rx="3" fill="#ECFEFF" stroke="#06B6D4" stroke-width="1"/>
    <rect x="605" y="120" width="25" height="15" rx="2" fill="#06B6D4" opacity="0.3"/>
    <rect x="527" y="165" width="135" height="30" rx="3" fill="#FFF1F2" stroke="#F472B6" stroke-width="1"/>
    <!-- 3D perspective overlay -->
    <rect x="672" y="112" width="70" height="85" rx="3" fill="#F0FDF4" stroke="#10B981" stroke-width="1"/>
    <text x="707" y="155" font-family="Google Sans, Roboto, sans-serif" font-size="8" fill="#10B981" text-anchor="middle" font-weight="600">3D VIEW</text>
    <!-- Toolbar -->
    <rect x="527" y="240" width="40" height="16" rx="8" fill="url(#accent-violet)"/>
    <text x="547" y="252" font-family="Google Sans, Roboto, sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="600">AR</text>
    <rect x="573" y="240" width="40" height="16" rx="8" fill="#E7E0EC"/>
    <text x="593" y="252" font-family="Google Sans, Roboto, sans-serif" font-size="7" fill="#49454F" text-anchor="middle">2D</text>
  </g>

  <!-- Car dashboard mockup -->
  <g filter="url(#card-shadow)">
    <rect x="810" y="160" width="340" height="160" rx="20" fill="#1C1B1F"/>
    <rect x="822" y="170" width="316" height="140" rx="12" fill="#111118"/>
    <!-- HUD elements -->
    <!-- Speed -->
    <text x="870" y="220" font-family="JetBrains Mono, monospace" font-size="36" font-weight="700" fill="#7B61FF">72</text>
    <text x="920" y="220" font-family="Google Sans, Roboto, sans-serif" font-size="12" fill="#A78BFA">km/h</text>
    <!-- Navigation arrow -->
    <polygon points="980,200 1000,185 1000,195 1030,195 1030,205 1000,205 1000,215" fill="#06B6D4" opacity="0.8"/>
    <text x="980" y="235" font-family="Google Sans, Roboto, sans-serif" font-size="10" fill="#67E8F9">Turn right in 200m</text>
    <!-- Traffic light indicators -->
    <circle cx="1080" cy="195" r="8" fill="#10B981" opacity="0.8"/>
    <circle cx="1100" cy="195" r="8" fill="#10B981" opacity="0.3"/>
    <circle cx="1120" cy="195" r="8" fill="#F472B6" opacity="0.3"/>
    <!-- Battery/Status bar -->
    <rect x="1060" y="225" width="60" height="6" rx="3" fill="#1C1B2E"/>
    <rect x="1060" y="225" width="42" height="6" rx="3" fill="#10B981" opacity="0.7"/>
    <!-- 3D map hint -->
    <path d="M980 260 L1020 245 L1060 260 L1020 275Z" fill="#7B61FF" opacity="0.2" stroke="#7B61FF" stroke-width="0.5"/>
    <path d="M1000 255 L1040 240 L1080 255 L1040 270Z" fill="#A78BFA" opacity="0.15" stroke="#A78BFA" stroke-width="0.5"/>
    <!-- Label -->
    <rect x="822" y="286" width="120" height="18" rx="9" fill="#7B61FF" opacity="0.15"/>
    <text x="882" y="299" font-family="Google Sans, Roboto, sans-serif" font-size="9" fill="#A78BFA" text-anchor="middle" font-weight="600">Android Automotive</text>
  </g>

  <!-- XR headset hint (small, top right) -->
  <g transform="translate(830, 50)" filter="url(#card-shadow)">
    <rect width="140" height="80" rx="16" fill="white" stroke="#E7E0EC" stroke-width="1"/>
    <ellipse cx="70" cy="35" rx="35" ry="18" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="70" cy="35" rx="20" ry="10" fill="#06B6D4" opacity="0.1"/>
    <text x="70" y="68" font-family="Google Sans, Roboto, sans-serif" font-size="9" fill="#06B6D4" text-anchor="middle" font-weight="600">XR Spatial</text>
  </g>

  <!-- TV hint (small, far right) -->
  <g transform="translate(1000, 50)" filter="url(#card-shadow)">
    <rect width="120" height="80" rx="12" fill="white" stroke="#E7E0EC" stroke-width="1"/>
    <!-- TV frame -->
    <rect x="15" y="12" width="90" height="50" rx="4" fill="#F5F3FF" stroke="#E7E0EC" stroke-width="1"/>
    <rect x="22" y="18" width="76" height="38" rx="2" fill="#FAFAF8"/>
    <!-- Data viz bars -->
    <rect x="30" y="38" width="10" height="16" rx="2" fill="#7B61FF" opacity="0.6"/>
    <rect x="45" y="30" width="10" height="24" rx="2" fill="#A78BFA" opacity="0.6"/>
    <rect x="60" y="34" width="10" height="20" rx="2" fill="#F472B6" opacity="0.6"/>
    <rect x="75" y="26" width="10" height="28" rx="2" fill="#06B6D4" opacity="0.6"/>
    <!-- Stand -->
    <rect x="50" y="62" width="20" height="3" rx="1" fill="#CAC4D0"/>
    <text x="60" y="78" font-family="Google Sans, Roboto, sans-serif" font-size="8" fill="#49454F" text-anchor="middle" font-weight="600">Android TV</text>
  </g>

  <!-- Floating code snippet (small, subtle) -->
  <g transform="translate(60, 370)" filter="url(#card-shadow)">
    <rect width="220" height="80" rx="12" fill="white" stroke="#E7E0EC" stroke-width="1"/>
    <text x="14" y="24" font-family="JetBrains Mono, monospace" font-size="9" fill="#8839EF">Scene</text>
    <text x="55" y="24" font-family="JetBrains Mono, monospace" font-size="9" fill="#4C4F69"> {</text>
    <text x="22" y="40" font-family="JetBrains Mono, monospace" font-size="9" fill="#1E66F5">ModelNode</text>
    <text x="83" y="40" font-family="JetBrains Mono, monospace" font-size="9" fill="#4C4F69">(</text>
    <text x="30" y="56" font-family="JetBrains Mono, monospace" font-size="9" fill="#DF8E1D">modelInstance</text>
    <text x="115" y="56" font-family="JetBrains Mono, monospace" font-size="9" fill="#4C4F69"> = shoe</text>
    <text x="22" y="72" font-family="JetBrains Mono, monospace" font-size="9" fill="#4C4F69">)</text>
    <text x="14" y="72" font-family="JetBrains Mono, monospace" font-size="9" fill="#4C4F69">}</text>
  </g>

  <!-- "Same code, every device" connecting dots -->
  <circle cx="400" cy="430" r="3" fill="#7B61FF" opacity="0.3"/>
  <circle cx="550" cy="440" r="3" fill="#F472B6" opacity="0.3"/>
  <circle cx="700" cy="430" r="3" fill="#06B6D4" opacity="0.3"/>
  <circle cx="850" cy="440" r="3" fill="#10B981" opacity="0.3"/>
  <line x1="400" y1="430" x2="550" y2="440" stroke="#E7E0EC" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="550" y1="440" x2="700" y2="430" stroke="#E7E0EC" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="700" y1="430" x2="850" y2="440" stroke="#E7E0EC" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="625" y="480" font-family="Google Sans, Roboto, sans-serif" font-size="13" fill="#49454F" text-anchor="middle" font-weight="500" letter-spacing="0.5">One Kotlin codebase → Phone · Tablet · Car · TV · XR · iOS</text>
</svg>
