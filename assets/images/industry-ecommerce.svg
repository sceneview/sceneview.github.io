<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#FFF1F2"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7B61FF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="24" fill="url(#bg)"/>

  <!-- Phone frame -->
  <g filter="url(#shadow)" transform="translate(100, 20)">
    <rect width="200" height="260" rx="28" fill="white" stroke="#E7E0EC" stroke-width="1.5"/>
    <!-- Notch -->
    <rect x="70" y="8" width="60" height="6" rx="3" fill="#E7E0EC"/>
    <!-- Product image area -->
    <rect x="16" y="24" width="168" height="130" rx="12" fill="#F5F3FF"/>
    <!-- 3D sneaker -->
    <ellipse cx="100" cy="105" rx="50" ry="18" fill="#E7E0EC" opacity="0.5"/>
    <path d="M60 90 Q70 55 100 62 Q130 55 145 78 Q150 88 140 93 L60 93Z" fill="url(#violet)" opacity="0.85"/>
    <path d="M55 93 Q60 88 100 88 Q140 88 148 93 Q155 100 143 105 L58 105 Q48 100 55 93Z" fill="#6D28D9" opacity="0.4"/>
    <!-- Rotate hint -->
    <circle cx="100" cy="85" r="20" fill="none" stroke="#7B61FF" stroke-width="1" stroke-dasharray="5 3" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 100 85" to="360 100 85" dur="6s" repeatCount="indefinite"/>
    </circle>
    <!-- AR badge -->
    <rect x="130" y="32" width="44" height="20" rx="10" fill="url(#violet)"/>
    <text x="152" y="46" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">AR</text>
    <!-- Product details -->
    <rect x="16" y="164" width="100" height="10" rx="5" fill="#1C1B1F" opacity="0.6"/>
    <rect x="16" y="180" width="65" height="8" rx="4" fill="#49454F" opacity="0.3"/>
    <text x="16" y="206" font-family="sans-serif" font-size="16" fill="#7B61FF" font-weight="700">$189</text>
    <!-- CTA -->
    <rect x="16" y="218" width="168" height="28" rx="14" fill="url(#violet)"/>
    <text x="100" y="237" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="600">View in your space</text>
    <!-- Home bar -->
    <rect x="76" y="252" width="48" height="4" rx="2" fill="#CAC4D0"/>
  </g>

  <!-- Label -->
  <text x="200" y="295" font-family="sans-serif" font-size="11" fill="#49454F" text-anchor="middle" font-weight="600" opacity="0.7">E-COMMERCE</text>
</svg>
