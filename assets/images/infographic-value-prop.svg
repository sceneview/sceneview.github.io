<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="cardGradLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7C3AED" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Left label -->
  <text x="140" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6B7280">Without SceneView</text>

  <!-- Gray box stack -->
  <g transform="translate(50, 28)">
    <rect x="0" y="0" width="180" height="22" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <text x="90" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B7280">OpenGL</text>

    <rect x="0" y="25" width="180" height="22" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <text x="90" y="40" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B7280">Shaders</text>

    <rect x="0" y="50" width="180" height="22" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <text x="90" y="65" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B7280">Scene Graph</text>

    <rect x="0" y="75" width="180" height="22" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <text x="90" y="90" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B7280">Gestures</text>

    <rect x="0" y="100" width="180" height="22" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <text x="90" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B7280">Lifecycle</text>

    <rect x="0" y="125" width="180" height="22" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <text x="90" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B7280">Threading</text>
  </g>

  <!-- ~200 lines label -->
  <text x="140" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#EF4444">~200 lines</text>

  <!-- Arrow -->
  <g transform="translate(280, 75)">
    <path d="M 0,25 L 180,25 L 180,10 L 220,35 L 180,60 L 180,45 L 0,45 Z" fill="url(#arrowGrad)" opacity="0.9"/>
  </g>

  <!-- Right label -->
  <text x="630" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#7C3AED">With SceneView</text>

  <!-- Sparkle stars -->
  <g fill="#F59E0B" opacity="0.8">
    <!-- Top-left sparkle -->
    <path d="M540,38 L543,45 L550,48 L543,51 L540,58 L537,51 L530,48 L537,45 Z" transform="scale(0.7) translate(200, 10)"/>
    <!-- Top-right sparkle -->
    <path d="M540,38 L543,45 L550,48 L543,51 L540,58 L537,51 L530,48 L537,45 Z" transform="translate(175, -8) scale(0.5)"/>
    <!-- Bottom-right sparkle -->
    <path d="M540,38 L543,45 L550,48 L543,51 L540,58 L537,51 L530,48 L537,45 Z" transform="translate(185, 100) scale(0.6)"/>
    <!-- Small sparkle left -->
    <path d="M540,38 L543,45 L550,48 L543,51 L540,58 L537,51 L530,48 L537,45 Z" transform="translate(0, 55) scale(0.4)"/>
  </g>

  <!-- Colorful card -->
  <rect x="545" y="40" width="170" height="100" rx="22" fill="url(#cardGradLight)" filter="url(#cardShadow)"/>
  <rect x="545" y="40" width="170" height="100" rx="22" fill="none" stroke="url(#cardGrad)" stroke-width="2"/>

  <!-- Code text inside card -->
  <text x="630" y="78" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#7C3AED">Scene {</text>
  <text x="630" y="100" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#DB2777">  ModelNode()</text>
  <text x="630" y="122" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#7C3AED">}</text>

  <!-- ~5 lines label -->
  <text x="630" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#10B981">~5 lines</text>
</svg>